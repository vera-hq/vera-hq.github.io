<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>ガッツ×チーム適性ミニ診断｜SANEI株式会社</title>
<style>
  :root { --navy:#0b2e4f; --green:#1f5c3c; --gold:#c9a227; --bg:#f7f8f6; }
  * { box-sizing: border-box; }
  body { font-family:"Hiragino Sans","Meiryo",sans-serif; background:var(--bg); margin:0; color:#222; line-height:1.7; }
  .wrap { max-width:560px; margin:0 auto; padding:0 0 32px; }
  header { background:var(--navy); color:#fff; padding:44px 24px 32px; text-align:center; }
  header .badge { display:inline-block; background:var(--gold); color:#222; font-size:11px; font-weight:bold; padding:3px 12px; border-radius:20px; margin-bottom:12px; }
  header h1 { font-size:22px; margin:0 0 8px; }
  header p { font-size:13px; opacity:.85; margin:0; }
  .progress-wrap { max-width:560px; margin:-18px auto 0; padding:0 24px; }
  .progress-card { background:#fff; border-radius:10px; padding:10px 16px; box-shadow:0 2px 10px rgba(0,0,0,.08); display:flex; align-items:center; gap:12px; }
  .progress-label { font-size:12px; color:#888; white-space:nowrap; }
  .progress { flex:1; height:6px; background:#e6e6e6; border-radius:3px; overflow:hidden; }
  .progress > div { height:100%; background:var(--green); width:0%; transition:width .3s; }
  .card { background:#fff; border:1px solid #e9e9e9; border-radius:12px; padding:28px 24px; margin:20px 24px 0; box-shadow:0 2px 10px rgba(0,0,0,.05); }
  .q { font-size:16px; font-weight:bold; margin-bottom:18px; line-height:1.6; color:var(--navy); }
  .opt { display:flex; align-items:center; gap:12px; width:100%; text-align:left; background:#f7f8f6; border:1px solid #e2e2e2; border-radius:10px; padding:14px 16px; margin-bottom:10px; font-size:14px; cursor:pointer; transition:all .15s; }
  .opt .letter { flex-shrink:0; width:26px; height:26px; border-radius:50%; background:var(--navy); color:#fff; font-size:12px; font-weight:bold; display:flex; align-items:center; justify-content:center; }
  .opt:hover { background:#eef3ee; border-color:var(--green); transform:translateY(-1px); }
  .result-header { text-align:center; }
  .result-header .type-badge { display:inline-block; font-size:12px; color:#888; margin-bottom:6px; }
  .result h2 { color:var(--navy); font-size:22px; margin:0 0 20px; text-align:center; }
  .bars { margin:20px 0; }
  .bar-row { margin-bottom:14px; }
  .bar-row .bar-label { display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px; color:#555; }
  .bar-row .bar-label b { color:var(--navy); }
  .bar-track { height:12px; background:#eee; border-radius:6px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:6px; transition:width .5s; }
  .bar-fill.guts { background:var(--gold); }
  .bar-fill.team { background:var(--green); }
  .result p.msg { text-align:center; font-size:14px; color:#444; margin:20px 0; }
  .cta-wrap { text-align:center; }
  .cta { display:inline-block; background:var(--gold); color:#222; font-weight:bold; padding:14px 32px; border-radius:30px; text-decoration:none; }
  .restart { display:block; text-align:center; margin-top:16px; font-size:13px; color:#888; cursor:pointer; text-decoration:underline; }
  footer { text-align:center; font-size:11px; color:#999; margin-top:24px; padding:0 24px; }
  footer a { color:#999; }
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="badge">体育会のきみへ ｜ SANEI株式会社</div>
  <h1>ガッツ×チーム適性 ミニ診断</h1>
  <p id="sub">1分・16問。あなたの"One Team"タイプがわかります。</p>
</header>
<div class="progress-wrap">
  <div class="progress-card">
    <span class="progress-label" id="qcount">Q1 / 16</span>
    <div class="progress"><div id="bar"></div></div>
  </div>
</div>
<div class="card" id="card"></div>
<footer>SANEI株式会社 採用ミニ診断（非公式・たたき台）・<a href="index.html">会社紹介ページへ戻る</a></footer>
</div>

<script>
const QUESTIONS = [
  { q: "難しい課題を任されたら？", opts: [
    { t: "まず動いて試してみる", g: 2, w: 0 },
    { t: "計画を立ててから動く", g: 1, w: 0 } ] },
  { q: "チームで意見が割れたら？", opts: [
    { t: "みんなの意見をまとめにいく", g: 0, w: 2 },
    { t: "自分の考えを通そうとする", g: 1, w: 0 } ] },
  { q: "失敗したときは？", opts: [
    { t: "すぐ次の一手を考える", g: 2, w: 0 },
    { t: "原因をじっくり振り返る", g: 1, w: 1 } ] },
  { q: "仲間が困っていたら？", opts: [
    { t: "自分の仕事を止めてでも手伝う", g: 1, w: 2 },
    { t: "自分の役割に集中する", g: 1, w: 0 } ] },
  { q: "新しい環境に入ったら？", opts: [
    { t: "とにかく飛び込んでみる", g: 2, w: 0 },
    { t: "周りをよく見て合わせる", g: 0, w: 2 } ] },
  { q: "目標達成のために大事なのは？", opts: [
    { t: "諦めずにやり切る根性", g: 2, w: 0 },
    { t: "仲間との連携", g: 0, w: 2 } ] },
  { q: "褒められて一番嬉しいのは？", opts: [
    { t: "「よく頑張った」", g: 2, w: 0 },
    { t: "「チームを支えてくれた」", g: 0, w: 2 } ] },
  { q: "休日、部活やチームの集まりがあったら？", opts: [
    { t: "積極的に参加する", g: 1, w: 2 },
    { t: "気が向けば参加する", g: 0, w: 1 } ] },
  { q: "大きな目標に向かうモチベーションは？", opts: [
    { t: "自分自身の成長", g: 2, w: 0 },
    { t: "チームの期待に応えること", g: 0, w: 2 } ] },
  { q: "きつい状況が続いたら？", opts: [
    { t: "歯を食いしばって乗り切る", g: 2, w: 0 },
    { t: "仲間と励まし合って乗り切る", g: 0, w: 2 } ] },
  { q: "リーダーを任されたら？", opts: [
    { t: "先頭に立って引っ張る", g: 2, w: 0 },
    { t: "みんなの意見を聞いてまとめる", g: 0, w: 2 } ] },
  { q: "初めての挑戦で不安なときは？", opts: [
    { t: "とりあえずやってみる", g: 2, w: 0 },
    { t: "経験のある人に相談する", g: 0, w: 1 } ] },
  { q: "目標未達だったときは？", opts: [
    { t: "悔しさをバネにする", g: 2, w: 0 },
    { t: "チームで振り返りをする", g: 0, w: 2 } ] },
  { q: "自分の強みだと思うのは？", opts: [
    { t: "最後までやり切る力", g: 2, w: 0 },
    { t: "周りを支える力", g: 0, w: 2 } ] },
  { q: "モチベーションが下がったときは？", opts: [
    { t: "自分で自分を奮い立たせる", g: 2, w: 0 },
    { t: "仲間に話を聞いてもらう", g: 0, w: 2 } ] },
  { q: "尊敬するのはどんな人？", opts: [
    { t: "圧倒的な努力量で結果を出す人", g: 2, w: 0 },
    { t: "チームをひとつにまとめる人", g: 0, w: 2 } ] }
];

let idx = 0;
let gutsScore = 0;
let teamScore = 0;
const MAX_SCORE = QUESTIONS.length * 2;

function render() {
  const bar = document.getElementById('bar');
  bar.style.width = (idx / QUESTIONS.length * 100) + '%';
  document.getElementById('qcount').textContent = 'Q' + Math.min(idx + 1, QUESTIONS.length) + ' / ' + QUESTIONS.length;

  if (idx >= QUESTIONS.length) { renderResult(); return; }

  const q = QUESTIONS[idx];
  const letters = ['A','B'];
  const card = document.getElementById('card');
  card.innerHTML = '<div class="q">Q' + (idx+1) + '. ' + q.q + '</div>' +
    q.opts.map((o, i) => '<button class="opt" onclick="answer(' + i + ')"><span class="letter">' + letters[i] + '</span>' + o.t + '</button>').join('');
}

function answer(i) {
  const o = QUESTIONS[idx].opts[i];
  gutsScore += o.g;
  teamScore += o.w;
  idx++;
  render();
}

function renderResult() {
  document.getElementById('bar').style.width = '100%';
  document.getElementById('qcount').textContent = '診断完了';
  document.getElementById('sub').textContent = 'あなたの"One Team"タイプが出ました。';

  const gutsPct = Math.round(gutsScore / MAX_SCORE * 100);
  const teamPct = Math.round(teamScore / MAX_SCORE * 100);

  let type = "";
  if (gutsScore >= teamScore + 4) type = "突破型ガッツマン";
  else if (teamScore >= gutsScore + 4) type = "縁の下のチームプレイヤー";
  else type = "One Teamオールラウンダー";

  const card = document.getElementById('card');
  card.innerHTML =
    '<div class="result">' +
    '<div class="result-header"><span class="type-badge">診断結果</span></div>' +
    '<h2>あなたは「' + type + '」タイプ</h2>' +
    '<div class="bars">' +
    '<div class="bar-row"><div class="bar-label"><span>ガッツ度</span><b>' + gutsPct + '%</b></div><div class="bar-track"><div class="bar-fill guts" style="width:' + gutsPct + '%"></div></div></div>' +
    '<div class="bar-row"><div class="bar-label"><span>チーム度</span><b>' + teamPct + '%</b></div><div class="bar-track"><div class="bar-fill team" style="width:' + teamPct + '%"></div></div></div>' +
    '</div>' +
    '<p class="msg">その姿勢、私たちが現場で一番大事にしていることです。よければ一度、話を聞きに来ませんか。</p>' +
    '<div class="cta-wrap"><a class="cta" href="index.html#next">まずは、話を聞いてみる（紹介ページへ）</a></div>' +
    '<span class="restart" onclick="restart()">もう一度診断する</span>' +
    '</div>';
}

function restart() {
  idx = 0; gutsScore = 0; teamScore = 0;
  document.getElementById('sub').textContent = '1分・16問。あなたの"One Team"タイプがわかります。';
  render();
}

render();
</script>
</body>
</html>
