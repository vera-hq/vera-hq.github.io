<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>高砂ヤンキース 成績分析ボード</title>
<style>
:root{
  --bg:#f4f3ee; --panel:#ffffff; --ink:#1b2334; --sub:#5c6577; --line:#dcdcd2;
  --navy:#18305e; --navy-deep:#122442; --red:#bf3a2b; --red-soft:#f3e2df;
  --win:#2e7d4f; --lose:#bf3a2b; --draw:#8a8f98;
  --chip:#eceada; --hl:#fdf6e7; --focus:#bf3a2b;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0e131e; --panel:#161d2c; --ink:#e9edf5; --sub:#9aa4b5; --line:#2a3348;
    --navy:#18305e; --navy-deep:#0c1830; --red:#e0553f; --red-soft:#3a2320;
    --win:#4caf7d; --lose:#e0553f; --draw:#7f8794;
    --chip:#222b3e; --hl:#243048; --focus:#e0553f;
  }
}
:root[data-theme="light"]{
  --bg:#f4f3ee; --panel:#ffffff; --ink:#1b2334; --sub:#5c6577; --line:#dcdcd2;
  --red:#bf3a2b; --red-soft:#f3e2df; --win:#2e7d4f; --lose:#bf3a2b; --draw:#8a8f98;
  --chip:#eceada; --hl:#fdf6e7; --focus:#bf3a2b; --navy-deep:#122442;
}
:root[data-theme="dark"]{
  --bg:#0e131e; --panel:#161d2c; --ink:#e9edf5; --sub:#9aa4b5; --line:#2a3348;
  --red:#e0553f; --red-soft:#3a2320; --win:#4caf7d; --lose:#e0553f; --draw:#7f8794;
  --chip:#222b3e; --hl:#243048; --focus:#e0553f; --navy-deep:#0c1830;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Yu Gothic","Meiryo",system-ui,sans-serif;
  font-size:14px;line-height:1.65;-webkit-text-size-adjust:100%}
#hdr{background:var(--navy-deep);color:#fff;padding:14px 16px 0;position:relative;overflow:hidden}
#hdr::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.35;
  background:repeating-linear-gradient(90deg,transparent 0 26px,rgba(255,255,255,.06) 26px 27px)}
#hdr .inner{max-width:1120px;margin:0 auto;position:relative;z-index:1}
#hdr .eyebrow{font-size:10px;letter-spacing:.35em;color:#c9a44c;font-weight:700}
#hdr h1{margin:2px 0 2px;font-size:clamp(19px,4vw,26px);letter-spacing:.04em}
#hdr h1 small{font-weight:600;font-size:.55em;color:#aebadb;margin-left:10px;letter-spacing:.1em}
#hdr .rec{font-size:13px;color:#dfe5f3;margin-bottom:10px}
#hdr .rec b{color:#fff;font-size:15px}
#nav{max-width:1120px;margin:0 auto;display:flex;gap:2px;overflow-x:auto;position:relative;z-index:1}
#nav a{flex:0 0 auto;padding:8px 14px;color:#c9d3ea;text-decoration:none;font-weight:700;font-size:12.5px;
  border-radius:8px 8px 0 0;white-space:nowrap;letter-spacing:.05em}
#nav a.on{background:var(--bg);color:var(--ink)}
#nav a:not(.on):hover{background:rgba(255,255,255,.08)}
main{max-width:1120px;margin:0 auto;padding:18px 14px 70px}
h2{font-size:17px;margin:26px 0 10px;letter-spacing:.03em;display:flex;align-items:baseline;gap:10px}
h2 .en{font-size:10px;letter-spacing:.3em;color:var(--red);font-weight:800}
h2:first-child{margin-top:4px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px}
.tblwrap{overflow-x:auto;background:var(--panel);border:1px solid var(--line);border-radius:10px;margin-bottom:14px}
table{border-collapse:collapse;width:100%;font-variant-numeric:tabular-nums;font-size:12.5px}
th,td{padding:6px 8px;border-bottom:1px solid var(--line);white-space:nowrap;text-align:right}
th{background:var(--chip);font-size:11px;position:sticky;top:0;cursor:default}
th.sortable{cursor:pointer}
th.sorted{color:var(--red)}
th:first-child,td:first-child, th.l,td.l{text-align:left}
tr.click{cursor:pointer}
tr.click:hover td{background:var(--hl)}
tr.total td{font-weight:800;background:var(--chip);border-top:2px solid var(--ink)}
td.top{color:var(--red);font-weight:800}
.badge{display:inline-block;min-width:20px;text-align:center;padding:0 6px;border-radius:999px;
  font-size:11px;font-weight:800;line-height:18px}
.bw{background:var(--win);color:#fff}.bl{background:var(--lose);color:#fff}.bd{background:var(--draw);color:#fff}
.g1{background:#c9a44c;color:#1b2334}.g2{background:#7fa1d6;color:#122442}.g3{background:#5a7fb8;color:#fff}.g4{background:var(--grade4,#18305e);color:#fff}
@media (prefers-color-scheme: dark){:root{--grade4:#3d5f9e}}
:root[data-theme="dark"]{--grade4:#3d5f9e}
:root[data-theme="light"]{--grade4:#18305e}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.pcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px;cursor:pointer}
.pcard:hover{border-color:var(--red)}
.pcard .nm{font-weight:800;font-size:15px}
.pcard .meta{color:var(--sub);font-size:11px;margin-bottom:4px}
.pcard .st{font-size:11.5px;color:var(--sub)}
.pcard .st b{color:var(--ink)}
.statgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-bottom:14px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.stat .k{font-size:10.5px;color:var(--sub);letter-spacing:.08em}
.stat .v{font-size:21px;font-weight:800;line-height:1.25}
.stat .v small{font-size:12px;font-weight:600;color:var(--sub)}
.stat .who{font-size:12px;color:var(--red);font-weight:700}
.controls{display:flex;flex-wrap:wrap;gap:10px 16px;align-items:center;margin-bottom:10px;font-size:12.5px}
.controls label{display:flex;align-items:center;gap:5px}
select,input[type=text],input[type=number],input[type=date]{
  background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:4px 7px;font:inherit;font-size:13px}
input[type=number]{width:64px;text-align:right}
input:focus,select:focus,button:focus{outline:2px solid var(--focus);outline-offset:1px}
button{font:inherit;border:1px solid var(--line);background:var(--panel);color:var(--ink);
  border-radius:8px;padding:6px 14px;cursor:pointer;font-weight:700;font-size:13px}
button.pri{background:var(--navy);border-color:var(--navy);color:#fff}
button.danger{color:var(--lose);border-color:var(--lose)}
button:hover{filter:brightness(1.06)}
details.cols{margin:6px 0 12px}
details.cols summary{cursor:pointer;font-weight:700;font-size:12.5px;color:var(--sub)}
.colgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:4px 12px;padding:10px;background:var(--panel);border:1px solid var(--line);border-radius:8px;margin-top:6px;font-size:12px}
.chartwrap{overflow-x:auto;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:14px}
.legend{display:flex;gap:16px;font-size:11.5px;color:var(--sub);margin-top:6px;flex-wrap:wrap}
.legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px}
.bars{display:grid;gap:6px}
.brow{display:grid;grid-template-columns:70px 1fr 58px;align-items:center;gap:8px;font-size:12px}
.btrack{background:var(--chip);border-radius:4px;height:16px;position:relative}
.bfill{height:100%;border-radius:4px;background:var(--navy)}
:root[data-theme="dark"] .bfill{background:#5a7fb8}
.note{color:var(--sub);font-size:12px}
.crumb{font-size:12.5px;margin-bottom:10px}
.crumb a{color:var(--red);text-decoration:none;font-weight:700}
.linescore td,.linescore th{padding:4px 7px;font-size:12.5px}
.formrow{display:flex;flex-wrap:wrap;gap:10px 18px;margin-bottom:10px;align-items:center}
.formrow label{font-size:12.5px;font-weight:700}
.entry td input[type=number]{width:46px;padding:3px 4px}
.entry td:first-child{min-width:96px}
.pit-add{margin:8px 0}
.help h3{font-size:14px;margin:16px 0 4px;color:var(--red)}
.tag{display:inline-block;background:var(--chip);border-radius:5px;padding:1px 7px;font-size:11px;font-weight:700;margin-right:5px}
footer{max-width:1120px;margin:30px auto 0;padding:0 14px 30px;color:var(--sub);font-size:11px}
.savebar{position:sticky;bottom:0;background:var(--panel);border-top:2px solid var(--navy);padding:10px 12px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:12px;border-radius:0 0 10px 10px;z-index:5}
.etbl input[type=text],.etbl input[type=number],.etbl input[type=date],.etbl select{padding:3px 5px;font-size:12.5px}
.etbl td,.etbl th{padding:4px 5px}
@media print{#nav,button,.controls,details.cols,.savebar{display:none!important}body{background:#fff}}
@media (max-width:560px){
  th,td{padding:5px 6px;font-size:11.5px}
  .statgrid{grid-template-columns:repeat(auto-fill,minmax(128px,1fr))}
}
</style>
</head>

function batZero(){return {g:0,pa:0,ab:0,r:0,h:0,d2:0,d3:0,hr:0,rbi:0,sb:0,sh:0,sf:0,bb:0,hbp:0,so:0,err:0}}

function addBat(a,b){a.g++;for(const k of ['pa','ab','r','h','d2','d3','hr','rbi','sb','sh','sf','bb','hbp','so','err'])a[k]+=b[k]||0}
function addPit(a,b){a.g++;for(const k of ['cg','w','l','d','outs','np','ha','hra','bb','hbp','so','bk','wp','runs','er'])a[k]+=b[k]||0}
function deriveBat(t){
  t.tb = t.h + t.d2 + 2*t.d3 + 3*t.hr;
  t.avg = t.ab? t.h/t.ab : null;
  t.obp = (t.ab+t.bb+t.hbp+t.sf)? (t.h+t.bb+t.hbp)/(t.ab+t.bb+t.hbp+t.sf) : null;
  t.slg = t.ab? t.tb/t.ab : null;
  t.ops = (t.obp!=null||t.slg!=null)? (t.obp||0)+(t.slg||0) : null;
  t.iso = t.avg!=null? t.slg-t.avg : null;
  t.kpct = t.pa? t.so/t.pa : null;
  t.bbpct = t.pa? (t.bb+t.hbp)/t.pa : null;
  t.bbk = t.so? (t.bb+t.hbp)/t.so : null;
  const bip = t.ab - t.so - t.hr + t.sf;
  t.babip = bip>0? (t.h-t.hr)/bip : null;
  return t;
}
function derivePit(t){
  const ip = t.outs/3;
  t.ip = t.outs;
  t.era = ip>0? t.er*SET.eraBasis/ip : null;
  t.whip = ip>0? (t.ha+t.bb)/ip : null;
  t.kbb = t.bb>0? t.so/t.bb : (t.so>0? Infinity:null);
  t.k9 = ip>0? t.so*SET.eraBasis/ip : null;
  t.bb9 = ip>0? (t.bb+t.hbp)*SET.eraBasis/ip : null;
  const bf = t.outs+t.ha+t.bb+t.hbp;
  t.oavg = (bf-t.bb-t.hbp)>0? t.ha/(bf-t.bb-t.hbp) : null;
  t.winp = (t.w+t.l)>0? t.w/(t.w+t.l) : null;
  return t;
}
function aggBatting(filter){
  const m = {};
  for(const g of DB.games){ if(filter && !filter(g)) continue;
    for(const b of g.batting){ (m[b.pid]=m[b.pid]||batZero()); addBat(m[b.pid],b); } }
  return Object.entries(m).map(([pid,t])=>Object.assign(deriveBat(t),{pid}));
}
function aggPitching(filter){
  const m = {};
  for(const g of DB.games){ if(filter && !filter(g)) continue;
    for(const b of g.pitching){ (m[b.pid]=m[b.pid]||pitZero()); addPit(m[b.pid],b); } }
  return Object.entries(m).map(([pid,t])=>Object.assign(derivePit(t),{pid}));
}
function teamBat(){ const t=batZero(); t.g=DB.games.length; for(const g of DB.games)for(const b of g.batting){for(const k of ['pa','ab','r','h','d2','d3','hr','rbi','sb','sh','sf','bb','hbp','so','err'])t[k]+=b[k]||0} return deriveBat(t); }
function teamPit(){ const t=pitZero(); t.g=DB.games.length; for(const g of DB.games)for(const b of g.pitching){for(const k of ['cg','w','l','d','outs','np','ha','hra','bb','hbp','so','bk','wp','runs','er'])t[k]+=b[k]||0} return derivePit(t); }

/* ================= 共通テーブル ================= */
const sortState = {};
function statTable(rows, defs, visible, tableId, opt){
  opt = opt||{};
  const st = sortState[tableId] || (sortState[tableId]={k:opt.defaultSort||null,dir:-1});
  const defsV = defs.filter(dd=>visible.includes(dd.k));
  if(st.k){
    const nullV = st.dir===-1? -1e15 : 1e15; // 未計算(-)は常に下へ
    rows = rows.slice().sort((a,b)=>{
      let av=a[st.k], bv=b[st.k];
      if(av==null)av=nullV; if(bv==null)bv=nullV;
      if(av===Infinity)av=1e12; if(bv===Infinity)bv=1e12;
      return (av<bv?-1:av>bv?1:0)*st.dir; // dir=-1で降順（1回目タップ=良い順）
    });
  }
  // best-value highlight (only among qualified rows if provided)
  const best = {};
  for(const dd of defsV){ if(!dd.best) continue;
    const pool = rows.filter(r=>!opt.qualify || r._q).map(r=>r[dd.k]).filter(v=>v!=null&&v!==Infinity);
    if(pool.length) best[dd.k] = dd.best==='max'? Math.max(...pool) : Math.min(...pool);
  }
  let html = `<div class="tblwrap"><table><thead><tr><th class="l">選手</th>`;
  if(opt.gradeCol) html += `<th>学年</th>`;
  html += defsV.map(dd=>`<th class="sortable ${st.k===dd.k?'sorted':''}" data-sort="${dd.k}" data-tbl="${tableId}">${dd.l}${st.k===dd.k?(st.dir<0?' ▼':' ▲'):''}</th>`).join('');
  html += `</tr></thead><tbody>`;
  for(const r of rows){
    const p = P(r.pid);
    html += `<tr class="click" data-go="#/player/${r.pid}"><td class="l"><b>${esc(p?p.name:r.pid)}</b>${opt.qualify&&!r._q?' <span class="note">※規定未満</span>':''}</td>`;
    if(opt.gradeCol) html += `<td>${p?p.grade+'年':''}</td>`;
    html += defsV.map(dd=>{
      const v=r[dd.k]; const isBest = dd.best && v!=null && best[dd.k]!==undefined && v===best[dd.k] && (!opt.qualify||r._q);
      return `<td class="${isBest?'top':''}">${dd.f(v)}</td>`;
    }).join('');
    html += `</tr>`;
  }
  if(opt.total){
    html += `<tr class="total"><td class="l">チーム計</td>`;
    if(opt.gradeCol) html += `<td></td>`;
    html += defsV.map(dd=>`<td>${dd.f(opt.total[dd.k])}</td>`).join('') + `</tr>`;
  }
  html += `</tbody></table></div>`;
  return html;
}

function gameChart(){
  const gs = DB.games; if(!gs.length) return '';
  const bw=26, gap=10, w=Math.max(640, gs.length*(bw+gap)+60), h=190, base=150;
  const mx = Math.max(...gs.map(g=>Math.max(g.rs,g.ra)),1);
  const sy = v => base - v/mx*110;
  let s = `<svg width="${w}" height="${h}" role="img" aria-label="試合ごとの得点と失点">`;
  for(const t of [0, Math.ceil(mx/2), mx]){
    s += `<line x1="40" y1="${sy(t)}" x2="${w-10}" y2="${sy(t)}" stroke="var(--line)" stroke-width="1"/>
          <text x="34" y="${sy(t)+4}" font-size="10" fill="var(--sub)" text-anchor="end">${t}</text>`;
  }
  gs.forEach((g,i)=>{
    const x = 46+i*(bw+gap);
    const res = g.rs>g.ra?'○':g.rs<g.ra?'●':'△';
    const rc = g.rs>g.ra?'var(--win)':g.rs<g.ra?'var(--lose)':'var(--draw)';
    s += `<rect x="${x}" y="${sy(g.rs)}" width="${bw/2-1}" height="${base-sy(g.rs)}" fill="var(--navy)" opacity="0.9"/>`;
    s += `<rect x="${x+bw/2}" y="${sy(g.ra)}" width="${bw/2-1}" height="${base-sy(g.ra)}" fill="var(--red)" opacity="0.75"/>`;
    s += `<text x="${x+bw/2}" y="${h-24}" font-size="9.5" fill="var(--sub)" text-anchor="middle">${g.no}</text>`;
    s += `<text x="${x+bw/2}" y="${h-8}" font-size="11" fill="${rc}" text-anchor="middle" font-weight="bold">${res}</text>`;
  });
  s += `</svg>`;
  return `<div class="chartwrap">${s}<div class="legend"><span><i style="background:var(--navy)"></i>高砂ヤンキースの得点</span><span><i style="background:var(--red)"></i>相手の得点</span><span>○勝ち ●負け △引き分け（横軸＝試合No.）</span></div></div>`;
}
function trendChart(pid){
  // cumulative AVG / OPS by game
  const pts=[]; const t=batZero(); t.g=0;
  for(const g of DB.games){
    const b = g.batting.find(x=>x.pid===pid); if(!b) continue;
    addBat(t,b); const dd=deriveBat(deep(t));
    pts.push({no:g.no, avg:dd.avg, ops:dd.ops});
  }
  if(pts.length<2) return '';
  const w=Math.max(560, pts.length*34+70), h=180, base=140;
  const mx = Math.max(1, ...pts.map(p=>p.ops||0));
  const sy=v=>base - (v||0)/mx*110, sx=i=>50+i*((w-70)/(pts.length-1));
  const line=(key,color,dash)=>{
    const d = pts.map((p,i)=>(i?'L':'M')+sx(i).toFixed(1)+' '+sy(p[key]).toFixed(1)).join(' ');
    return `<path d="${d}" fill="none" stroke="${color}" stroke-width="2" ${dash?'stroke-dasharray="5 4"':''}/>`+
      pts.map((p,i)=>`<circle cx="${sx(i)}" cy="${sy(p[key])}" r="2.6" fill="${color}"/>`).join('');
  };
  let s=`<svg width="${w}" height="${h}" role="img" aria-label="打率とOPSの推移">`;
  for(const t2 of [0,0.5,Math.round(mx*10)/10]){
    s+=`<line x1="46" y1="${sy(t2)}" x2="${w-10}" y2="${sy(t2)}" stroke="var(--line)"/>
        <text x="40" y="${sy(t2)+4}" font-size="10" fill="var(--sub)" text-anchor="end">${t2.toFixed(1)}</text>`;
  }
  s+=line('ops','var(--red)',true)+line('avg','var(--navy)',false);
  pts.forEach((p,i)=>{ if(i%2===0||pts.length<15) s+=`<text x="${sx(i)}" y="${h-8}" font-size="9.5" fill="var(--sub)" text-anchor="middle">${p.no}</text>`; });
  s+=`</svg>`;
  return `<div class="chartwrap">${s}<div class="legend"><span><i style="background:var(--navy)"></i>打率（累積）</span><span><i style="background:var(--red)"></i>OPS（累積・点線）</span><span>横軸＝試合No.</span></div></div>`;
}

function vDash(){
  const rec = header();

  const minPa = Math.ceil(teamGames*SET.minPaMult), minOuts = Math.ceil(teamGames*SET.minIpMult*3);
  const bats = aggBatting().map(r=>(r._q=r.pa>=minPa,r));
  const pits = aggPitching().map(r=>(r._q=r.outs>=minOuts,r));
  const lead=(rows,k,dir,fmt,q)=>{
    const pool = rows.filter(r=>(!q||r._q)&&r[k]!=null&&r[k]!==Infinity);
    if(!pool.length) return {n:'-',v:'-'};
    const best = pool.reduce((a,b)=> (dir==='max'? (b[k]>a[k]):(b[k]<a[k]))?b:a );
    return {n:PN(best.pid), v:fmt(best[k])};
  };
  const cards = [
    ['首位打者', lead(bats,'avg','max',f3,true)],
    ['本塁打王', lead(bats,'hr','max',fint,false)],
    ['打点王', lead(bats,'rbi','max',fint,false)],
    ['盗塁王', lead(bats,'sb','max',fint,false)],
    ['最高出塁率', lead(bats,'obp','max',f3,true)],
    ['最高OPS', lead(bats,'ops','max',f3,true)],
    ['最優秀防御率', lead(pits,'era','min',f2,true)],
    ['最多勝', lead(pits,'w','max',v=>v+'勝',false)],
    ['奪三振王', lead(pits,'so','max',fint,false)]
  ];
  V.innerHTML = `
    <h2><span class="en">SEASON</span>シーズンサマリー</h2>
    <div class="statgrid">
      <div class="stat"><div class="k">勝敗</div><div class="v">${rec.w}勝${rec.l}敗${rec.d}分</div></div>
      <div class="stat"><div class="k">チーム打率</div><div class="v">${f3(tb.avg)}</div></div>
      <div class="stat"><div class="k">チームOPS</div><div class="v">${f3(tb.ops)}</div></div>
      <div class="stat"><div class="k">チーム防御率（${SET.eraBasis}回換算）</div><div class="v">${f2(tp.era)}</div></div>
      <div class="stat"><div class="k">総盗塁</div><div class="v">${tb.sb}</div></div>
      <div class="stat"><div class="k">総奪三振</div><div class="v">${tp.so}</div></div>
    </div>
    <h2><span class="en">TITLES</span>タイトルホルダー <span class="note">（率系は規定打席 ${minPa}打席・規定投球回 ${fip(minOuts)}回以上）</span></h2>
    <div class="statgrid">${cards.map(([k,x])=>`<div class="stat"><div class="k">${k}</div><div class="v">${x.v}</div><div class="who">${esc(x.n)}</div></div>`).join('')}</div>

function renderPitBox(){
  const box = document.getElementById('pitBox'); if(!box) return;
  box.innerHTML = editPitch.map((pl,i)=>`
    <div class="panel" data-pi="${i}">
      <div class="formrow">
        <b>${i+1}人目</b>
        <label>投手 <select class="pSel">${DB.players.map(p=>`<option value="${p.id}" ${p.id===pl.pid?'selected':''}>${esc(p.name)}（${p.grade}年）</option>`).join('')}</select></label>
        <label>投球回 <input type="number" min="0" class="pIn" data-k="_ipW" value="${Math.floor(pl.outs/3)}" style="width:46px" inputmode="numeric">回</label>
        <label>＋アウト <select class="pIn" data-k="_ipO">${[0,1,2].map(n=>`<option value="${n}" ${pl.outs%3===n?'selected':''}>${n}/3</option>`).join('')}</select></label>
        <label><input type="checkbox" class="pIn" data-k="cg" ${pl.cg?'checked':''}>完投</label>
        <label><input type="checkbox" class="pIn" data-k="w" ${pl.w?'checked':''}>勝利</label>
        <label><input type="checkbox" class="pIn" data-k="l" ${pl.l?'checked':''}>敗戦</label>
        <label><input type="checkbox" class="pIn" data-k="d" ${pl.d?'checked':''}>引分</label>
        <button class="danger pDel" style="margin-left:auto">削除</button>
      </div>
      <div class="formrow">${PIT_IN.map(([k,l])=>`<label>${l} <input type="number" min="0" class="pIn" data-k="${k}" value="${pl[k]||''}" inputmode="numeric" style="width:52px"></label>`).join('')}</div>
    </div>`).join('') || '<div class="note" style="margin-bottom:8px">まだ投手が追加されていません。</div>';
  box.querySelectorAll('.pDel').forEach(b=>b.onclick = e=>{ editPitch.splice(+e.target.closest('[data-pi]').dataset.pi,1); renderPitBox(); });
  box.querySelectorAll('.pSel').forEach(s=>s.onchange = e=>{ editPitch[+e.target.closest('[data-pi]').dataset.pi].pid = e.target.value; });
  box.querySelectorAll('.pIn').forEach(inp=>inp.addEventListener('change',e=>{
    const pl = editPitch[+e.target.closest('[data-pi]').dataset.pi];
    const k = e.target.dataset.k;
    if(k==='_ipW'||k==='_ipO'){
      const row = e.target.closest('[data-pi]');
      const wv = +row.querySelector('[data-k=_ipW]').value||0;
      const ov = +row.querySelector('[data-k=_ipO]').value||0;
      pl.outs = wv*3+ov;
    } else if(['cg','w','l','d'].includes(k)) pl[k] = e.target.checked?1:0;
    else pl[k] = +e.target.value||0;
  }));
}
function saveGameFromForm(no){
  const opp = document.getElementById('eOpp').value.trim();
  if(!opp){ alert('対戦相手を入力してください'); return; }
  const batting = [];
  V.querySelectorAll('tr[data-pid]').forEach(tr=>{
    if(!tr.querySelector('.playchk').checked) return;
    const b = {pid:tr.dataset.pid};
    tr.querySelectorAll('.bin').forEach(inp=>{ b[inp.dataset.k] = +inp.value||0; });
    batting.push(b);
  });
  batting.sort((a,b)=>(a.order||99)-(b.order||99));
  editPitch.forEach((pl,i)=>pl.seq=i+1);
  const innU = [...V.querySelectorAll('.innU')].map(i=>i.value===''?null:+i.value);
  const innT = [...V.querySelectorAll('.innT')].map(i=>i.value===''?null:+i.value);
  while(innU.length&&innU[innU.length-1]==null)innU.pop();
  while(innT.length&&innT[innT.length-1]==null)innT.pop();
  const rs = +document.getElementById('eRs').value||0;
  const ra = +document.getElementById('eRa').value||0;
  const oursFirst = document.getElementById('eFirst').value==='us';
  const usRow = {team:'高砂ヤンキース',innings:innU,r:rs};
  const themRow = {team:opp,innings:innT,r:ra};
  const gobj = {
    no: no ?? (DB.games.length? Math.max(...DB.games.map(g=>g.no))+1 : 1),
    opponent: opp,
    tournament: document.getElementById('eTour').value.trim(),
    date: document.getElementById('eDate').value,
    place: document.getElementById('ePlace').value.trim(),
    rs, ra,
    lineScore: oursFirst? [usRow,themRow]:[themRow,usRow],
    batting, pitching: deep(editPitch)
  };
  if(no!=null){ const i = DB.games.findIndex(g=>g.no===no); DB.games[i]=gobj; }
  else DB.games.push(gobj);
  save();
  go('#/game/'+gobj.no);
}

function dl(content,name,type){
  const b = new Blob([content],{type});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b); a.download = name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),5000);
}

    <div class="panel"><div class="formrow">
      <label>チーム名 <input type="text" id="eTeam" value="${esc(EDIT.teamName||'')}" style="width:180px"></label>
      <label>年度 <input type="text" id="eSeason2" value="${esc(EDIT.season||'')}" style="width:110px"></label>
    </div><div class="note">内部ID（p1・p2…）は自動管理です。触る必要はありません。</div></div>
    <h2 style="font-size:14px"><span class="en">ROSTER</span>❶ 選手名簿 <span class="note">✓＝一覧・入力候補に表示。改名しても成績はその選手についてきます。</span></h2>
    <div id="rosterTbl"></div>
    <div class="pit-add"><button id="addP">＋ 選手を追加</button></div>
    <h2 style="font-size:14px"><span class="en">GAMES</span>❷ 試合の情報 <span class="note">相手名・日付・スコアを直接修正。✏️で打席の数字ページへ。</span></h2>
    <div id="gameTbl"></div>
    <h2 style="font-size:14px"><span class="en">SPREADSHEET</span>❸ 成績を表で編集 <span class="note">試合を選んで、打者・投手の数字を一括で直せます。</span></h2>
    <div class="controls"><label>試合を選ぶ <select id="statGame"></select></label></div>
    <div id="statGrid"></div>
    <div class="savebar">
      <button class="pri" id="editSave" style="font-size:15px;padding:9px 22px">💾 変更を保存</button>
      <button id="editReset">変更前に戻す</button>
      <span class="note">保存するまで、他のページの数字は変わりません。</span>
    </div>`;
  document.getElementById('eTeam').addEventListener('input',e=>{EDIT.teamName=e.target.value;markDirty();});
  document.getElementById('eSeason2').addEventListener('input',e=>{EDIT.season=e.target.value;markDirty();});
  renderRoster(); renderGameTbl();
  const sel=document.getElementById('statGame');
  sel.onchange=()=>renderStatGrid(+sel.value);
  refreshStatSelect();
  document.getElementById('addP').onclick=()=>{ EDIT.players.push({id:newPid(),grade:4,number:'',name:'新しい選手',realName:'',active:true}); markDirty(); renderRoster(); };
  document.getElementById('editSave').onclick=()=>{
    if(!confirm('この内容で保存します。全ページに反映されます。よろしいですか？')) return;
    DB.teamName=EDIT.teamName; DB.season=EDIT.season; DB.players=EDIT.players; DB.games=EDIT.games;
    save(); EDIT=null; EDIT_DIRTY=false; alert('保存しました'); render();
  };
  document.getElementById('editReset').onclick=()=>{
    if(EDIT_DIRTY && !confirm('編集した内容を捨てて、保存済みの状態に戻します。よろしいですか？')) return;
    EDIT=null; render();
  };
}
function renderRoster(){
  const box=document.getElementById('rosterTbl'); if(!box) return;
  box.innerHTML = `<div class="tblwrap"><table class="etbl"><thead><tr><th>表示</th><th>学年</th><th>背番号</th><th class="l">表示名</th><th class="l">本名（任意・非公開）</th><th></th></tr></thead><tbody>`+
    EDIT.players.map(p=>`<tr data-pid="${p.id}">
      <td><input type="checkbox" class="e-active" ${p.active!==false?'checked':''}></td>
      <td><select class="e-grade">${GRADES_ALL.map(g=>`<option value="${g}" ${g===p.grade?'selected':''}>${g}年</option>`).join('')}</select></td>
      <td><input type="text" class="e-num" value="${esc(p.number)}" style="width:50px" inputmode="numeric"></td>
      <td class="l"><input type="text" class="e-name" value="${esc(p.name)}" style="width:120px"></td>
      <td class="l"><input type="text" class="e-real" value="${esc(p.realName||'')}" style="width:150px" placeholder="（空欄OK）"></td>
      <td><button class="danger e-del-p">削除</button></td></tr>`).join('')+`</tbody></table></div>`;
  const upd=(pid,f)=>{const p=EDIT.players.find(x=>x.id===pid); if(p){f(p); markDirty();}};
  box.querySelectorAll('tr[data-pid]').forEach(tr=>{
    const pid=tr.dataset.pid;
    tr.querySelector('.e-active').addEventListener('change',e=>upd(pid,p=>p.active=e.target.checked));
    tr.querySelector('.e-grade').addEventListener('change',e=>upd(pid,p=>p.grade=+e.target.value));
    tr.querySelector('.e-num').addEventListener('input',e=>upd(pid,p=>p.number=e.target.value));
    tr.querySelector('.e-name').addEventListener('input',e=>upd(pid,p=>p.name=e.target.value));
    tr.querySelector('.e-real').addEventListener('input',e=>upd(pid,p=>p.realName=e.target.value));
    tr.querySelector('.e-del-p').onclick=()=>{
      const p=EDIT.players.find(x=>x.id===pid); if(!p) return;
      const used=EDIT.games.some(g=>g.batting.some(b=>b.pid===pid)||g.pitching.some(b=>b.pid===pid));
      if(!confirm(`「${p.name}」を名簿から削除します。${used?'この選手には試合成績が記録されています。名簿から消えますが、各試合内の記録は残ります。':''}よろしいですか？`)) return;
      EDIT.players=EDIT.players.filter(x=>x.id!==pid); markDirty(); renderRoster(); refreshStatSelect();
    };
  });
}
function renderGameTbl(){
  const box=document.getElementById('gameTbl'); if(!box) return;
  box.innerHTML = `<div class="tblwrap"><table class="etbl"><thead><tr><th>No</th><th>日付</th><th class="l">大会</th><th class="l">対戦相手</th><th>得点</th><th>失点</th><th class="l">場所</th><th></th></tr></thead><tbody>`+
    EDIT.games.slice().sort((a,b)=>a.no-b.no).map(g=>`<tr data-no="${g.no}">
      <td>${g.no}</td>
      <td><input type="date" class="g-date" value="${esc(g.date||'')}"></td>
      <td class="l"><input type="text" class="g-tour" value="${esc(g.tournament||'')}" style="width:92px"></td>
      <td class="l"><input type="text" class="g-opp" value="${esc(g.opponent)}" style="width:150px"></td>
      <td><input type="number" class="g-rs" value="${g.rs}" style="width:46px" inputmode="numeric"></td>
      <td><input type="number" class="g-ra" value="${g.ra}" style="width:46px" inputmode="numeric"></td>
      <td class="l"><input type="text" class="g-place" value="${esc(g.place||'')}" style="width:120px"></td>
      <td><button data-go2="#/entry/${g.no}">✏️</button> <button class="danger g-del">🗑</button></td></tr>`).join('')+`</tbody></table></div>`;
  const upd=(no,f)=>{const g=EDIT.games.find(x=>x.no===no); if(g){f(g); markDirty();}};
  box.querySelectorAll('tr[data-no]').forEach(tr=>{
    const no=+tr.dataset.no;
    tr.querySelector('.g-date').addEventListener('input',e=>upd(no,g=>g.date=e.target.value));
    tr.querySelector('.g-tour').addEventListener('input',e=>upd(no,g=>g.tournament=e.target.value));
    tr.querySelector('.g-opp').addEventListener('input',e=>upd(no,g=>{g.opponent=e.target.value; const opp=(g.lineScore||[]).find(x=>!/高砂/.test(x.team)); if(opp) opp.team=e.target.value;}));
    tr.querySelector('.g-rs').addEventListener('input',e=>upd(no,g=>g.rs=+e.target.value||0));
    tr.querySelector('.g-ra').addEventListener('input',e=>upd(no,g=>g.ra=+e.target.value||0));
    tr.querySelector('.g-place').addEventListener('input',e=>upd(no,g=>g.place=e.target.value));
    tr.querySelector('.g-del').onclick=()=>{
      if(!confirm(`試合No.${no} を削除します。よろしいですか？`)) return;
      EDIT.games=EDIT.games.filter(x=>x.no!==no); markDirty(); renderGameTbl(); refreshStatSelect();
    };
  });
}
function blankBat(pid,order){return {pid,order,pa:0,ab:0,r:0,h:0,d2:0,d3:0,hr:0,rbi:0,sb:0,sh:0,sf:0,bb:0,hbp:0,so:0,err:0};}
function blankPit(pid,seq){return {pid,seq,cg:0,w:0,l:0,d:0,outs:0,np:0,ha:0,hra:0,bb:0,hbp:0,so:0,bk:0,wp:0,runs:0,er:0};}
function renderStatGrid(no){
  const box=document.getElementById('statGrid'); if(!box) return;
  const g=EDIT.games.find(x=>x.no===no); if(!g){box.innerHTML='';return;}
  const opts=sel=>EDIT.players.map(pp=>`<option value="${pp.id}" ${pp.id===sel?'selected':''}>${esc(pp.name)}</option>`).join('');
  const bat=`<div class="note" style="margin:4px 0"><b>打撃</b>（空欄＝0）</div><div class="tblwrap"><table class="etbl"><thead><tr><th class="l">打者</th><th>打順</th>${BAT_IN.map(([,l])=>`<th>${l}</th>`).join('')}<th></th></tr></thead><tbody>`+
    g.batting.map((b,i)=>`<tr data-bi="${i}"><td class="l"><select class="s-pid" style="width:92px">${opts(b.pid)}</select></td>
      <td><input type="number" class="s-b" data-k="order" value="${b.order||''}" style="width:42px" inputmode="numeric"></td>`+
      BAT_IN.map(([k])=>`<td><input type="number" class="s-b" data-k="${k}" value="${b[k]||''}" style="width:44px" inputmode="numeric"></td>`).join('')+
      `<td><button class="danger s-bdel">✕</button></td></tr>`).join('')+`</tbody></table></div><div class="pit-add"><button id="sAddBat">＋ 打者を追加</button></div>`;
  const pit=`<div class="note" style="margin:10px 0 4px"><b>投手</b></div><div class="tblwrap"><table class="etbl"><thead><tr><th class="l">投手</th><th>回</th><th>+out</th><th>勝</th><th>敗</th><th>分</th>${PIT_IN.map(([,l])=>`<th>${l}</th>`).join('')}<th></th></tr></thead><tbody>`+
    g.pitching.map((p,i)=>`<tr data-pi="${i}"><td class="l"><select class="s-ppid" style="width:92px">${opts(p.pid)}</select></td>
      <td><input type="number" class="s-p" data-k="_ipW" value="${Math.floor(p.outs/3)}" style="width:40px" inputmode="numeric"></td>
      <td><select class="s-p" data-k="_ipO">${[0,1,2].map(n=>`<option value="${n}" ${p.outs%3===n?'selected':''}>${n}/3</option>`).join('')}</select></td>
      <td><input type="checkbox" class="s-pc" data-k="w" ${p.w?'checked':''}></td>
      <td><input type="checkbox" class="s-pc" data-k="l" ${p.l?'checked':''}></td>
      <td><input type="checkbox" class="s-pc" data-k="d" ${p.d?'checked':''}></td>`+
      PIT_IN.map(([k])=>`<td><input type="number" class="s-p" data-k="${k}" value="${p[k]||''}" style="width:44px" inputmode="numeric"></td>`).join('')+
      `<td><button class="danger s-pdel">✕</button></td></tr>`).join('')+`</tbody></table></div><div class="pit-add"><button id="sAddPit">＋ 投手を追加</button></div>`;
  box.innerHTML = bat+pit;
  box.querySelectorAll('tr[data-bi]').forEach(tr=>{
    const b=g.batting[+tr.dataset.bi];
    tr.querySelector('.s-pid').addEventListener('change',e=>{b.pid=e.target.value;markDirty();});
    tr.querySelectorAll('.s-b').forEach(inp=>inp.addEventListener('input',e=>{b[e.target.dataset.k]=+e.target.value||0;markDirty();}));
    tr.querySelector('.s-bdel').onclick=()=>{g.batting.splice(+tr.dataset.bi,1);markDirty();renderStatGrid(no);};
  });
  box.querySelector('#sAddBat').onclick=()=>{ if(!EDIT.players.length)return; g.batting.push(blankBat(EDIT.players[0].id,g.batting.length+1));markDirty();renderStatGrid(no);};
  box.querySelectorAll('tr[data-pi]').forEach(tr=>{
    const p=g.pitching[+tr.dataset.pi];
    tr.querySelector('.s-ppid').addEventListener('change',e=>{p.pid=e.target.value;markDirty();});
    tr.querySelectorAll('.s-pc').forEach(c=>c.addEventListener('change',e=>{p[e.target.dataset.k]=e.target.checked?1:0;markDirty();}));
    tr.querySelectorAll('.s-p').forEach(inp=>inp.addEventListener('change',e=>{
      const k=e.target.dataset.k;
      if(k==='_ipW'||k==='_ipO'){const wv=+tr.querySelector('[data-k=_ipW]').value||0;const ov=+tr.querySelector('[data-k=_ipO]').value||0;p.outs=wv*3+ov;}
      else p[k]=+e.target.value||0; markDirty();
    }));
    tr.querySelector('.s-pdel').onclick=()=>{g.pitching.splice(+tr.dataset.pi,1);markDirty();renderStatGrid(no);};
  });
  box.querySelector('#sAddPit').onclick=()=>{ if(!EDIT.players.length)return; g.pitching.push(blankPit(EDIT.players[0].id,g.pitching.length+1));markDirty();renderStatGrid(no);};
}

/* ================= レンダリング ================= */
function render(){
  nav();
  const h = (location.hash.replace('#/','')||'dash').split('/');
  window.scrollTo(0,0);
  switch(h[0]){
    case 'games': vGames(); break;
    case 'game': vGame(+h[1]); break;
    case 'bat': vBat(); break;
    case 'pit': vPit(); break;
    case 'players': vPlayers(); break;
    case 'player': vPlayer(h[1]); break;
    case 'grade': vGrade(); break;
    case 'entry': vEntry(h[1]); break;
    case 'edit': vEdit(); break;
    case 'data': vData(); break;
    default: vDash();
  }
  V.querySelectorAll('details.cols').forEach(d=>d.addEventListener('toggle',()=>{
    SET['_open_'+d.dataset.cset] = d.open; saveSet();
  }));
}
document.addEventListener('click',e=>{
  const th = e.target.closest('th.sortable');
  if(th){ const id=th.dataset.tbl,k=th.dataset.sort;
    const st = sortState[id]||(sortState[id]={k:null,dir:-1});
    if(st.k===k) st.dir*=-1; else {st.k=k;st.dir=-1;}
    render(); return; }
  const chk = e.target.closest('.colchk');
  if(chk){ const arr = SET[chk.dataset.set];
    const defs = chk.dataset.set==='batCols'? BAT_DEFS:PIT_DEFS;
    let next = defs.map(d=>d.k).filter(k=> k===chk.dataset.k? chk.checked : arr.includes(k));
    SET[chk.dataset.set]=next; saveSet(); render();
    return; }
  const row = e.target.closest('[data-go]');
  if(row && !e.target.closest('input,select,button,a,label')){ go(row.dataset.go); return; }
  const btn = e.target.closest('[data-go2]');
  if(btn){ go(btn.dataset.go2); return; }
});
render();
</script>
