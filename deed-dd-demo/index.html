<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>DEED D.D デモ</title>
<!--
  ===== 実装ハード制約チェックリスト（全✅で完成・v3）=====
  [✅] 1 単一ファイル・CSS/JS全インライン（<style>1個・<script>1個・外部<link>/@import/url(http)なし。
        ※<img src="data:image/...">は端末内で生成したdataURLであり外部リソースには該当しない）
  [✅] 2 外部リソース読込ゼロ（CDN/Webフォント/Tailwind/Chart.js禁止・グラフはinline SVGをJSで構築）
  [✅] 3 ネットワーク通信ゼロ（fetch/XHR/WebSocket/EventSource/sendBeacon 不使用・Claude/Anthropic参照なし）
  [✅] 4 システムフォントのみ
  [✅] 5 noindex meta
  [✅] 6 デモバッジ「DEMO ダミーデータ」常設
  [✅] 7 localStorage 保存・再開・クリア（キー dd_demo_v1 据え置き・v1→v2非破壊migration・QuotaExceededガード＝写真を古い順に落として再試行し必ず通知）
  [✅] 8 決定的（Math.random 不使用・new Date は年齢/期限/日付キー/月初判定のみ。写真はユーザー入力＝決定性の対象外）
  [✅] 9 XSS（ユーザー文字列は esc() 経由・読み込みJSON内のdataURLは正規表現で厳格検証）
  [✅] 10 プレースホルダ/未実装コメント禁止（全機能実装）
  [✅] 11 v3: 写真非解析の正直バッジ（2か所常設）・スタッフ画面デモ注記・退会ロック・DEED_FORMULA一元CONFIG（一般値(仮)→DEED式差し替え前提）
  ※スタッフ閲覧フラグ(staffView)は保存しない＝リロードで会員ビューに戻り合言葉を再要求する。仕様でありバグではない。
-->
<style>
:root{
  --accent:#D85A30; --accent-dark:#712B13; --accent-soft:#FAECE7;
  --accent-glow:rgba(216,90,48,.28);
  --bg:#0E0C0B; --surface:#1A1614; --surface-2:#241E1B; --surface-3:#2E2622;
  --line:#3A302B; --line-soft:rgba(255,255,255,.06);
  --text:#F4EEEA; --text-2:#C7BBB2; --text-3:#8C7E75; --text-on-accent:#FFFFFF;
  --ok:#4FB477; --ok-soft:rgba(79,180,119,.16);
  --warn:#E6B23A; --warn-soft:rgba(230,178,58,.16);
  --danger:#E0533B; --danger-soft:rgba(224,83,59,.16);
  --info:#5AA6D8;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Meiryo",system-ui,sans-serif;
  --fs-hero:28px; --fs-h1:22px; --fs-h2:18px; --fs-body:15px; --fs-sub:13px; --fs-label:12px; --fs-micro:11px; --lh:1.6;
  --r-lg:20px; --r-md:14px; --r-sm:9px; --r-pill:999px;
  --pad:16px; --gap:12px;
  --shadow-card:0 6px 20px rgba(0,0,0,.45);
  --shadow-cta:0 6px 16px var(--accent-glow);
  --shell-w:480px; --ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0;}
body{
  background:var(--bg); color:var(--text); font-family:var(--font);
  font-size:var(--fs-body); line-height:var(--lh);
  display:flex; flex-direction:column; align-items:center; min-height:100dvh;
}
#demoBadge{
  position:fixed; top:8px; right:8px; z-index:9999;
  background:var(--accent-dark); color:#fff; font-size:var(--fs-micro); font-weight:700;
  border-radius:var(--r-pill); padding:3px 10px; pointer-events:none; letter-spacing:.04em;
}
#app{
  width:min(100%,var(--shell-w)); background:var(--surface); min-height:100dvh;
  margin-inline:auto; position:relative; overflow:hidden;
  padding-bottom:env(safe-area-inset-bottom);
}
@media(min-width:520px){
  #app{
    border:1px solid var(--line); border-radius:24px;
    box-shadow:0 20px 60px rgba(0,0,0,.6);
    min-height:min(900px,100dvh); margin-block:24px; overflow:hidden;
  }
  #demoBadge{position:absolute; top:8px; right:8px;}
  body{justify-content:flex-start;}
}
.screen{display:none; flex-direction:column; min-height:100dvh; padding:0;}
@media(min-width:520px){ .screen{min-height:min(852px,calc(100dvh - 48px));} }
.screen.active{display:flex;}
.scroll{flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:var(--pad) var(--pad) 90px;}
.pad{padding:var(--pad);}
h1.title{font-size:var(--fs-h1); font-weight:700; margin:4px 0 2px;}
.subtitle{font-size:var(--fs-sub); color:var(--text-2); margin:0 0 14px;}
.h2{font-size:var(--fs-h2); font-weight:700; margin:18px 0 8px;}
.muted{color:var(--text-3);}
.small{font-size:var(--fs-sub); color:var(--text-2);}
.micro{font-size:var(--fs-micro); color:var(--text-3);}

.topbar{display:flex; align-items:center; gap:10px; padding:14px var(--pad) 4px; min-height:48px;}
.backbtn{background:none; border:none; color:var(--accent); font-size:var(--fs-body); font-weight:600; cursor:pointer; padding:6px 4px; display:inline-flex; align-items:center; gap:4px;}
.gear{margin-left:auto; background:none; border:none; color:var(--text-2); cursor:pointer; font-size:18px; padding:6px;}

.btn{display:flex; align-items:center; justify-content:center; gap:8px; width:100%; border:none; cursor:pointer; font-family:var(--font); font-size:var(--fs-body); border-radius:var(--r-md); transition:transform .12s var(--ease), box-shadow .12s var(--ease);}
.btn.primary{height:52px; font-weight:700; color:var(--text-on-accent); background:linear-gradient(135deg,var(--accent),var(--accent-dark)); box-shadow:var(--shadow-cta);}
.btn.primary:active{transform:translateY(1px); box-shadow:0 3px 8px var(--accent-glow);}
.btn.secondary{height:48px; background:transparent; border:1px solid var(--line); color:var(--text);}
.btn.secondary:active{background:var(--surface-3);}
.btn.ghost{height:44px; background:none; color:var(--accent); font-weight:600;}
.btn.ghost:active{background:var(--accent-soft); color:var(--accent-dark);}
.btn.danger{height:52px; font-weight:700; background:transparent; border:1px solid var(--danger); color:var(--danger);}
.btn.danger:active{background:var(--danger-soft);}
.btn[disabled],.btn.disabled{opacity:.45; filter:grayscale(.3); pointer-events:none;}

.footer-cta{position:sticky; bottom:0; background:linear-gradient(to top,var(--surface) 70%,transparent); border-top:1px solid var(--line); padding:12px var(--pad) calc(12px + env(safe-area-inset-bottom)); display:flex; gap:10px;}
.footer-cta .btn{flex:1;}
.footer-cta .btn.secondary{flex:0 0 42%;}

.field{margin-bottom:14px;}
.flabel{display:block; font-size:var(--fs-label); color:var(--text-3); font-weight:600; margin:0 0 6px;}
.req{color:var(--accent);}
.inp,select.inp{width:100%; height:50px; background:var(--surface-3); border:1px solid var(--line); border-radius:var(--r-md); color:var(--text); font-size:var(--fs-body); font-family:var(--font); padding:0 14px; appearance:none; -webkit-appearance:none;}
.inp::placeholder{color:var(--text-3);}
.inp:focus,select.inp:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow);}
.inp.err{border-color:var(--danger); background:var(--danger-soft);}
.selwrap{position:relative;}
.selwrap::after{content:""; position:absolute; right:14px; top:50%; transform:translateY(-25%); border-left:5px solid transparent; border-right:5px solid transparent; border-top:6px solid var(--text-3); pointer-events:none;}
.row3{display:grid; grid-template-columns:1.3fr 1fr 1fr; gap:8px;}
.inline-err{font-size:var(--fs-sub); color:var(--danger); margin-top:5px; display:flex; gap:4px; align-items:center;}
.formerr{background:var(--danger-soft); border-radius:var(--r-md); padding:10px 12px; font-size:var(--fs-sub); color:var(--danger); margin-bottom:12px;}

.chips{display:flex; flex-wrap:wrap; gap:8px;}
.chip{display:inline-flex; align-items:center; gap:5px; min-height:38px; padding:0 14px; border-radius:var(--r-pill); background:var(--surface-3); border:1px solid transparent; color:var(--text-2); font-size:var(--fs-body); cursor:pointer; font-family:var(--font); transition:.12s var(--ease);}
.chip.on{background:var(--accent-soft); border-color:var(--accent); color:var(--accent-dark); font-weight:600;}
.chip.on::before{content:"✓"; font-weight:800;}

.stepper{display:flex; align-items:flex-start; justify-content:space-between; padding:6px var(--pad) 2px; position:relative;}
.stepper .seg{display:flex; flex-direction:column; align-items:center; flex:1; position:relative; z-index:2;}
.stepper .dot{width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; background:var(--surface-3); color:var(--text-3); border:2px solid transparent;}
.stepper .seg.cur .dot{border-color:var(--accent); color:var(--text); box-shadow:0 0 0 4px var(--accent-glow);}
.stepper .seg.done .dot{background:var(--accent); color:#fff;}
.stepper .lab{font-size:var(--fs-micro); color:var(--text-3); margin-top:5px;}
.stepper .seg.cur .lab,.stepper .seg.done .lab{color:var(--text-2);}
.stepper .bar{position:absolute; top:13px; height:3px; background:var(--line); z-index:1;}
.stepper .bar.fill{background:var(--accent);}

.card{background:var(--surface-2); border-radius:var(--r-md); padding:14px; margin-bottom:12px;}
.card.lg{border-radius:var(--r-lg);}
.metric-card{background:var(--surface-2); border-radius:var(--r-md); padding:14px; box-shadow:var(--shadow-card); margin-bottom:12px;}
.mc-lab{font-size:var(--fs-label); color:var(--text-3); font-weight:600;}
.auto-badge{font-size:var(--fs-micro); background:var(--accent-soft); color:var(--accent-dark); border-radius:var(--r-sm); padding:2px 7px; font-weight:700;}
.mc-top{display:flex; justify-content:space-between; align-items:center;}
.mc-val{font-size:var(--fs-h1); font-weight:700; margin-top:3px;}
.mc-val .u{font-size:var(--fs-sub); color:var(--text-3); font-weight:400; margin-left:4px;}

.band{position:relative; height:10px; border-radius:var(--r-pill); margin-top:10px; background:var(--surface-3); overflow:visible;}
.band .seg-c{position:absolute; top:0; bottom:0;}
.band .dot-m{position:absolute; top:-3px; width:7px; height:16px; border-radius:var(--r-pill); background:var(--accent); border:1px solid #fff; transform:translateX(-50%);}
.band.warn .dot-m{background:var(--warn);}
.band-labs{display:flex; justify-content:space-between; font-size:var(--fs-micro); color:var(--text-3); margin-top:6px;}
.verdict{font-size:var(--fs-sub); font-weight:600; margin-top:4px;}

.srcchips{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;}
.srcchip{font-size:var(--fs-label); border-radius:var(--r-sm); padding:3px 8px; cursor:pointer; line-height:1.3; position:relative;}
.srcchip.input{background:rgba(90,166,216,.18); color:var(--info);}
.srcchip.choice{background:var(--accent-soft); color:var(--accent-dark);}
.srcchip.ref{background:var(--surface-3); color:var(--text-2);}
.srcchip .tip{display:none; position:absolute; left:0; bottom:calc(100% + 6px); width:230px; background:var(--surface-3); border:1px solid var(--line); color:var(--text-2); font-size:var(--fs-micro); font-weight:400; padding:8px 10px; border-radius:var(--r-md); z-index:50; box-shadow:var(--shadow-card); text-align:left; white-space:normal;}
.srcchip.open .tip{display:block;}

.role-card{display:flex; gap:12px; align-items:flex-start; background:var(--surface-2); border-radius:var(--r-md); padding:14px; margin-bottom:10px;}
.role-ic{flex:0 0 40px; width:40px; height:40px; border-radius:50%; background:var(--accent-soft); display:flex; align-items:center; justify-content:center; font-size:20px;}
.role-card h3{margin:0 0 3px; font-size:var(--fs-body); font-weight:700;}
.role-card p{margin:0; font-size:var(--fs-sub); color:var(--text-2);}

.hero{padding:24px var(--pad) 8px; background:radial-gradient(120% 80% at 50% 0%,rgba(216,90,48,.18),transparent 60%);}
.hero h1{font-size:var(--fs-hero); font-weight:800; line-height:1.3; margin:0 0 8px;}
.logoword{font-size:var(--fs-hero); font-weight:800; letter-spacing:.12em; text-align:center;}
.logoword .t{color:var(--accent);}

.measured-by{display:flex; align-items:center; gap:12px; background:var(--surface-2); border-radius:var(--r-md); padding:12px; margin-bottom:12px;}
.avatar{flex:0 0 44px; width:44px; height:44px; border-radius:50%; background:var(--accent-soft); color:var(--accent-dark); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:18px;}
.mb-info{flex:1;}
.mb-info b{font-size:var(--fs-body);}
.mb-info div{font-size:var(--fs-sub); color:var(--text-2);}
.ok-badge{font-size:var(--fs-micro); background:var(--ok-soft); color:var(--ok); border-radius:var(--r-sm); padding:2px 7px; font-weight:700;}

.switch{display:inline-flex; align-items:center; gap:8px; cursor:pointer; font-size:var(--fs-sub); color:var(--text-2);}
.switch .track{width:42px; height:24px; border-radius:var(--r-pill); background:var(--surface-3); position:relative; transition:.15s;}
.switch .knob{position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:var(--text-3); transition:.15s;}
.switch.on .track{background:var(--accent);}
.switch.on .knob{left:20px; background:#fff;}

.activity-card{display:flex; align-items:center; gap:10px; background:var(--surface-2); border:1px solid transparent; border-radius:var(--r-md); padding:13px 14px; margin-bottom:10px; cursor:pointer;}
.activity-card.on{border-color:var(--accent); background:linear-gradient(90deg,var(--accent-soft),var(--surface-2) 70%);}
.activity-card .ac-main{flex:1;}
.activity-card .ac-main b{font-size:var(--fs-body); display:block;}
.activity-card.on .ac-main b{color:var(--accent-dark);}
.activity-card .ac-sub{font-size:var(--fs-sub); color:var(--text-3);}
.activity-card .ac-f{font-size:var(--fs-sub); font-weight:700; background:var(--surface-3); border-radius:var(--r-pill); padding:3px 10px; color:var(--text-2);}
.activity-card.on .ac-f{background:var(--accent); color:#fff;}
.activity-card .ac-chk{width:20px; flex:0 0 20px; color:var(--accent); font-weight:800; text-align:center;}

.habit-line{display:flex; align-items:center; justify-content:space-between; background:var(--surface-3); border-radius:var(--r-md); padding:8px 12px; margin-top:8px;}
.habit-line .hl-name{font-size:var(--fs-sub); font-weight:600;}
.stepperN{display:flex; align-items:center; gap:10px;}
.stepperN button{width:32px; height:32px; border-radius:50%; border:1px solid var(--line); background:var(--surface-2); color:var(--text); font-size:18px; cursor:pointer; line-height:1;}
.stepperN .nv{min-width:52px; text-align:center; font-size:var(--fs-sub);}

.prev-band{background:var(--surface-2); border-radius:var(--r-md); padding:12px 14px; font-size:var(--fs-sub); margin-top:6px; margin-bottom:6px;}
.prev-band.danger{background:var(--danger-soft);}
.prev-band b{color:var(--text);}

.analyzing-wrap{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; padding:var(--pad);}
.ring{width:140px; height:140px; border-radius:50%; display:flex; align-items:center; justify-content:center; position:relative; background:conic-gradient(var(--accent) 0deg, var(--surface-3) 0);}
.ring .inner{width:104px; height:104px; border-radius:50%; background:var(--surface); display:flex; align-items:center; justify-content:center; font-weight:800; color:var(--accent); font-size:24px; letter-spacing:.05em;}
.analyzing-text{font-size:var(--fs-body); color:var(--text-2); text-align:center; min-height:24px;}

.bignum{font-size:var(--fs-hero); font-weight:800; color:var(--accent);}
.guard-card{border:1px solid var(--warn); background:var(--warn-soft);}
.transparency{border-left:3px solid var(--accent); background:var(--surface-2); border-radius:var(--r-md); padding:14px; margin-top:16px;}
.transparency .l1{font-size:var(--fs-sub); color:var(--text);}
.transparency .l2{font-size:var(--fs-body); font-weight:700; color:var(--accent); margin-top:4px;}
.dd-quote{display:flex; gap:10px; align-items:flex-start; background:var(--accent-soft); border-radius:var(--r-md); padding:12px; margin:12px 0; color:var(--accent-dark);}
.dd-quote .av{flex:0 0 32px; width:32px; height:32px; border-radius:50%; background:#fff; color:var(--accent); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12px;}
.dd-quote p{margin:0; font-size:var(--fs-sub);}

.greet{display:flex; align-items:center; gap:10px; padding:16px var(--pad) 6px;}
.greet .g-av{flex:0 0 42px; width:42px; height:42px; border-radius:50%; background:var(--accent-soft); color:var(--accent-dark); display:flex; align-items:center; justify-content:center; font-weight:800;}
.greet b{font-size:var(--fs-h2);}
.greet .g-date{font-size:var(--fs-sub); color:var(--text-3);}
.kcal-badge{margin-left:auto; text-align:right; font-size:var(--fs-micro); color:var(--text-3);}
.kcal-badge b{display:block; font-size:var(--fs-body); color:var(--accent);}
.check-card{display:flex; align-items:center; gap:12px; background:var(--surface-2); border-radius:var(--r-md); padding:13px 14px; margin-bottom:10px; cursor:pointer;}
.check-card .ck{flex:0 0 24px; width:24px; height:24px; border-radius:50%; border:2px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:14px; color:transparent;}
.check-card.on .ck{background:var(--accent); border-color:var(--accent); color:#fff;}
.check-card .ck-t{font-size:var(--fs-body);}
.check-card.on .ck-t{color:var(--text-3); text-decoration:line-through;}
.done-band{background:var(--ok-soft); color:var(--ok); border-radius:var(--r-md); padding:10px 14px; font-size:var(--fs-sub); font-weight:700; text-align:center; margin-bottom:12px;}
.streak-big{font-size:var(--fs-hero); font-weight:800; color:var(--accent);}
.streak-dots{display:flex; gap:7px; margin-top:10px;}
.streak-dots .sd{width:22px; height:22px; border-radius:50%; background:var(--surface-3); display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--text-3);}
.streak-dots .sd.on{background:var(--accent); color:#fff;}
.svg-wrap{width:100%; overflow:hidden;}
.svg-wrap svg{width:100%; height:auto; display:block;}
.summary-line{font-size:var(--fs-sub); margin-top:8px;}

.tabbar{display:flex; border-top:1px solid var(--line); background:var(--surface); position:sticky; bottom:0;}
.tabbar button{flex:1; background:none; border:none; color:var(--text-3); font-family:var(--font); font-size:var(--fs-label); padding:10px 0 calc(10px + env(safe-area-inset-bottom)); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; border-top:2px solid transparent;}
.tabbar button .ti{font-size:18px;}
.tabbar button.on{color:var(--accent); border-top-color:var(--accent);}

.chat-head{display:flex; align-items:center; gap:10px; padding:14px var(--pad); border-bottom:1px solid var(--line);}
.chat-head .c-av{flex:0 0 40px; width:40px; height:40px; border-radius:50%; background:var(--accent-soft); color:var(--accent-dark); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px;}
.chat-head b{font-size:var(--fs-body);}
.chat-head .on-dot{width:8px; height:8px; border-radius:50%; background:var(--ok); display:inline-block; margin-right:4px;}
.chat-head .c-sub{font-size:var(--fs-micro); color:var(--text-3);}
.chat-scroll{flex:1; overflow-y:auto; padding:14px var(--pad); display:flex; flex-direction:column; gap:10px;}
.msg{max-width:80%; padding:10px 13px; border-radius:14px; font-size:var(--fs-sub); white-space:pre-wrap; word-break:break-word;}
.msg.dd{align-self:flex-start; background:var(--surface-2); border-bottom-left-radius:4px;}
.msg.me{align-self:flex-end; background:var(--accent-dark); color:#fff; border-bottom-right-radius:4px;}
.quickq{display:flex; gap:8px; overflow-x:auto; padding:8px var(--pad); border-top:1px solid var(--line-soft);}
.quickq .chip{flex:0 0 auto; white-space:nowrap;}
.quickq .chip::before{content:none;}
.chat-input{display:flex; gap:8px; padding:10px var(--pad) calc(10px + env(safe-area-inset-bottom)); border-top:1px solid var(--line); align-items:center;}
.chat-input .inp{height:44px;}
.send{flex:0 0 44px; width:44px; height:44px; border-radius:50%; border:none; background:var(--accent); color:#fff; font-size:18px; cursor:pointer;}
.chat-note{font-size:var(--fs-micro); color:var(--text-3); text-align:center; padding:2px var(--pad) 6px;}

<script>
"use strict";

/* ---------- XSS安全化 ---------- */
function esc(s){ return String(s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

/* ---------- ストレージ ---------- */
var STORE_KEY = "dd_demo_v1";

function defaultState(){
  return {
    v:2,  /* スキーマ版番号（保存キー名 dd_demo_v1 とは独立。キーは据え置き） */
    screen:"consent",
    tab:"home",
    consent:false,
    profile:{ name:"", birth:{y:1990,m:1,d:1}, age:null, sex:null },
    body:{ height:172.0, weight:78.5, bodyFatPct:24.0, muscle:56.4, edited:false },
    goal:{ purpose:null, targetWeight:null, deadline:null },
    life:{ activity:null, habits:[], none:false },
    result:null,
    weights:[],
    today:{ date:null, checks:[false,false,false] },
    streakDays:[],
    chat:[],
    meals:[],
    girths:[],
    photos:{ start:null, latest:null },
    strictLog:[],
    memberStatus:"active",
    milestonesSeen:[]
  };
}
var state = defaultState();

/* 保存: QuotaExceededガード付き。容量超過時は最古の食事写真→最新体写真→開始体写真の順に
   落として再試行し、必ずトーストで通知する（保存失敗を黙って握りつぶさない＝誠実の原則） */
function isQuotaErr(e){ return !!e && (e.name==="QuotaExceededError" || e.code===22 || e.code===1014 || e.name==="NS_ERROR_DOM_QUOTA_REACHED"); }
var saveEnvFailNotified=false; /* 非クォータ失敗の通知は1回だけ（連打防止） */
function save(){
  /* 回数固定でなく「落とせる写真が無くなるまで」再試行。各反復は必ず写真を1枚落とすか
     returnするため無限ループにならない（写真枚数は有限） */
  for(;;){
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); return true; }
    catch(e){
      if(!isQuotaErr(e)){
        /* SecurityError等（プライベートブラウジング等）も黙って握りつぶさない＝誠実の原則 */
        if(!saveEnvFailNotified){ saveEnvFailNotified=true; toast("この環境ではデータを保存できません（リロードで記録が消えます）。ブラウザの設定をご確認ください"); }
        return false;
      }
      var withPhoto=state.meals.filter(function(m){ return m.photo; });
      if(withPhoto.length>0){ withPhoto[0].photo=null; withPhoto[0].photoRemoved=true; toast("保存容量のため古い食事写真を1枚削除しました（記録は残っています）"); continue; }
      if(state.photos.latest){ state.photos.latest=null; toast("保存容量のため最新の記録写真を削除しました"); continue; }
      if(state.photos.start){ state.photos.start=null; toast("保存容量のため開始の記録写真を削除しました"); continue; }
      toast("この端末の保存領域が足りません。設定からデータ書き出し→全消去をご検討ください");
      return false;
    }
  }
}
/* v1→v2 migration（読み込み時のメモリ内変換のみ・元データは書き換えない） */
function migrateState(o){
  if(!o.v || o.v===1){ o=Object.assign({}, o); o.v=2; }
  return o;
}
/* 読み込みJSON内のdataURLは厳格検証（XSS/不正データ対策） */
function sanitizeDataURL(u){
  return (typeof u==="string" && /^data:image\/(jpeg|jpg|png|webp);base64,[A-Za-z0-9+/=]+$/.test(u)) ? u : null;
}
function normPhoto(ph){
  if(!ph || typeof ph!=="object") return null;
  var u=sanitizeDataURL(ph.dataURL);
  if(!u || typeof ph.date!=="string") return null;
  return { date:ph.date, dataURL:u };
}
/* normalize: defaultState を土台に o を上書きする正方向マージ
   （v2のload()はネスト内欠損キーがデフォルト補完されないマージ方向バグがあったため修正） */
function normalizeState(o){
  var d=defaultState(), s={};
  Object.keys(d).forEach(function(k){ s[k]=d[k]; });
  Object.keys(o).forEach(function(k){ s[k]=o[k]; });
  s.profile=Object.assign(defaultState().profile, o.profile||{});
  s.body=Object.assign(defaultState().body, o.body||{});
  s.goal=Object.assign(defaultState().goal, o.goal||{});
  s.life=Object.assign(defaultState().life, o.life||{});
  s.today=Object.assign(defaultState().today, o.today||{});
  /* today.checks: 配列以外（破損JSON）でviewHomeがTypeErrorにならないよう常にboolean 3要素へ正規化 */
  s.today.checks = Array.isArray(s.today.checks) ? [0,1,2].map(function(i){ return s.today.checks[i]===true; }) : [false,false,false];
  /* result: インポートJSON経由でinnerHTMLに連結されるため厳格検証（数値のみ通す＝esc不要のまま安全）。
     必須数値が欠損/不正なら result=null（カルテ再作成へ誘導） */
  if(s.result && typeof s.result==="object"){
    var r0=s.result, rn={}, rOK=true;
    ["bmr","tdee","adj","recommended","protein","fat","carb","safe","floorApplied"].forEach(function(k){
      if(typeof r0[k]==="number" && isFinite(r0[k])) rn[k]=r0[k]; else rOK=false;
    });
    rn.pace=(typeof r0.pace==="number" && isFinite(r0.pace))?r0.pace:null; /* paceは正規exportでもnullあり得る */
    rn.guarded=!!r0.guarded; rn.overPace=!!r0.overPace;
    rn.safeDate=(typeof r0.safeDate==="string" && /^\d{4}-\d{2}-\d{2}$/.test(r0.safeDate))?r0.safeDate:null;
    rn.training=(typeof r0.training==="string")?r0.training:"";
    s.result=rOK?rn:null;
  } else { s.result=null; }
  if(!Array.isArray(s.weights)) s.weights=[];
  s.weights=s.weights.filter(function(e){ return e && typeof e.date==="string" && typeof e.val==="number" && isFinite(e.val); });
  if(!Array.isArray(s.streakDays)) s.streakDays=[];
  if(!Array.isArray(s.chat)) s.chat=[];
  if(!Array.isArray(s.life.habits)) s.life.habits=[];
  if(!Array.isArray(s.meals)) s.meals=[];
  s.meals=s.meals.filter(function(m){ return m && typeof m==="object"; }).map(function(m){
    return {
      id: typeof m.id==="string" ? m.id : "m?",
      date: typeof m.date==="string" ? m.date : "",
      slot: ["morning","noon","evening","snack"].indexOf(m.slot)>=0 ? m.slot : "noon",
      tags: Array.isArray(m.tags) ? m.tags.filter(function(t){ return !!MEAL_TAGS[t]; }) : [],
      amount: ["low","mid","high"].indexOf(m.amount)>=0 ? m.amount : "mid",
      photo: sanitizeDataURL(m.photo),
      photoRemoved: !!m.photoRemoved,
      comment: (m.comment && typeof m.comment.text==="string")
        ? { text:m.comment.text, severity:(m.comment.severity==="strict"?"strict":(m.comment.severity==="warn"?"warn":"ok")), basis:String(m.comment.basis||"") }
        : null
    };
  });
  if(!Array.isArray(s.girths)) s.girths=[];
  s.girths=s.girths.filter(function(x){ return x && typeof x.date==="string"; }).map(function(x){
    return { date:x.date,
      waist:(typeof x.waist==="number" && isFinite(x.waist))?x.waist:null,
      chest:(typeof x.chest==="number" && isFinite(x.chest))?x.chest:null };
  });
  /* 写真10件上限をインポート/読込経路でも強制（超過stateの持ち込みでsave()のクォータ再試行を破らない） */
  var npWith=s.meals.filter(function(m){ return m.photo; });
  while(npWith.length>10){ var npOld=npWith.shift(); npOld.photo=null; npOld.photoRemoved=true; }
  if(!s.photos || typeof s.photos!=="object") s.photos={start:null,latest:null};
  s.photos={ start:normPhoto(s.photos.start), latest:normPhoto(s.photos.latest) };
  if(!Array.isArray(s.strictLog)) s.strictLog=[];
  s.strictLog=s.strictLog.filter(function(x){ return x && typeof x.date==="string" && typeof x.text==="string"; }).slice(-20);
  if(s.memberStatus!=="active" && s.memberStatus!=="resigned") s.memberStatus="active";
  if(!Array.isArray(s.milestonesSeen)) s.milestonesSeen=[];
  if(["home","meals","body","chat","settings"].indexOf(s.tab)<0) s.tab="home";
  s.v=2;
  return s;
}
function load(){
  try{
    var raw = localStorage.getItem(STORE_KEY);
    if(!raw) return false;
    var o = JSON.parse(raw);
    if(!o || typeof o!=="object") return false;
    state = normalizeState(migrateState(o));
    return true;
  }catch(e){ state = defaultState(); return false; }
}
function clearAll(){ try{ localStorage.removeItem(STORE_KEY); }catch(e){} state = defaultState(); }

/* ---------- 日付（決定的：new Date は年齢/期限週のみ） ---------- */
function todayISO(){
  var d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function ageFromBirth(y,m,d){
  var t=new Date(), age=t.getFullYear()-y, mm=(t.getMonth()+1)-m;
  if(mm<0 || (mm===0 && t.getDate()<d)) age--;
  return age;
}
function weeksUntil(iso){
  if(!iso) return null;
  var ms=new Date(iso+"T00:00:00") - new Date();
  return Math.max(1, Math.round(ms/(7*24*3600*1000)));
}
function daysUntil(iso){
  if(!iso) return null;
  return Math.max(0, Math.ceil((new Date(iso+"T00:00:00")-new Date())/(24*3600*1000)));
}
function addDaysISO(iso, days){
  var base = iso ? new Date(iso+"T00:00:00") : new Date();
  base.setDate(base.getDate()+days);
  return base.getFullYear()+"-"+String(base.getMonth()+1).padStart(2,"0")+"-"+String(base.getDate()).padStart(2,"0");
}
function fmtJP(iso){ if(!iso) return ""; var p=iso.split("-"); return (p[1]*1)+"月"+(p[2]*1)+"日"; }
function round1(n){ return Math.round(n*10)/10; }
function round2(n){ return Math.round(n*100)/100; }

/* ============================================================
   計算エンジン（決定的・健康ガード・出どころラベル）
   source ∈ {input, choice, reference}
   ============================================================ */
/* ============================================================
   DEED_FORMULA — 係数・補正の一元CONFIG
   MTG方針(2026-07-01): 現在は「一般値(仮)」。正式には“DEED式”
   （DEEDのスクールで教える係数体系）に差し替える。
   ★このオブジェクトを書き換えるだけで全画面（カルテ/食事/からだ/スタッフ）に反映★
   ============================================================ */
var DEED_FORMULA = {
  label: "一般値(仮)・正式にはDEED式に差し替え予定",
  activity: {
    "1.2":  { factor:1.2,   label:"座り仕事中心(運動なし)" },
    "1.375":{ factor:1.375, label:"軽い運動 週1-3回" },
    "1.55": { factor:1.55,  label:"中程度 週3-5回" },
    "1.725":{ factor:1.725, label:"ほぼ毎日 激しい運動" }
  },
  goalAdjust: { lose:-500, gain:300, keep:0 },
  protein: { perKgDefault:1.6, perKgGain:1.7, capG:170 },
  fatRatio: 0.25,
  safePace: { losePctPerWeek:0.01, loseAbsKg:0.5, gainPctPerWeek:0.005, gainAbsKg:0.3 },
  kcalFloor: { m:1500, f:1200, na:1350, tdeeRatio:0.8 }
};
var ACTIVITY = DEED_FORMULA.activity; /* 既存参照の互換エイリアス */
var HABITS = { homePilates:"家ピラティス", running:"ランニング", bodyweight:"自重トレ", gymStrength:"ジム筋トレ", walking:"ウォーキング", other:"その他", none:"いまは特になし" };
var SEX_LABEL = { m:"男性", f:"女性", na:"回答しない" };

function rv(value, source, label, opt){
  opt = opt||{};
  if(source!=="input" && source!=="choice" && source!=="reference") throw new Error("source タグ不正: "+source);
  if(source==="reference" && (!opt.formula || !opt.premise)) throw new Error("reference は formula と premise が必須: "+label);
  return { value:value, source:source, label:label, formula:opt.formula||null, premise:opt.premise||null, citation:opt.citation||null };
}
function sexFloor(sex){ var F=DEED_FORMULA.kcalFloor; if(sex==="f") return F.f; if(sex==="na") return F.na; return F.m; }

function bmr(p){
  var W=p.body.weight, H=p.body.height, A=p.profile.age, sx=p.profile.sex;
  var base = 10*W + 6.25*H - 5*A, v;
  if(sx==="m") v=base+5; else if(sx==="f") v=base-161; else v=base-78;
  v=Math.round(v);
  return rv(v,"reference","Mifflin-St Jeor式",{
    formula:"10×体重 + 6.25×身長 − 5×年齢 (+5 男 / −161 女 / −78 回答しない)",
    premise:"あなたの入力（身長"+H+"cm・体重"+W+"kg・年齢"+A+"歳・性別:"+SEX_LABEL[sx]+"）から算出。"+(sx==="na"?"性別=回答しないのため男女式の平均値を使用。":""),
    citation:"Mifflin MD, St Jeor ST (1990)"
  });
}
function activityFactor(p){
  var info = ACTIVITY[String(p.life.activity)];
  if(!info) throw new Error("活動係数が未選択：TDEEは算出できません（フォールバック係数なし）");
  return rv(info.factor,"choice",info.label,{});
}
function tdee(p){
  var b=bmr(p), af=activityFactor(p);
  return rv(Math.round(b.value*af.value),"reference","TDEE（基礎代謝×活動係数）",{
    formula:"BMR × 活動係数",
    premise:"活動係数は〔あなたが選んだ〕「"+af.label+"」＝"+af.value+"。固定値ではありません。"
  });
}
function goalDir(p){
  var gw=p.goal.targetWeight, w=p.body.weight;
  if(gw==null) return "maintain";
  var diff=gw-w;
  if(diff>=1.5) return "gain"; if(diff<=-1.5) return "lose"; return "maintain";
}
function goalAdjust(p){
  var GA=DEED_FORMULA.goalAdjust;
  var d=goalDir(p), v = d==="gain"?GA.gain:(d==="lose"?GA.lose:GA.keep);
  var b=bmr(p), fl=sexFloor(p.profile.sex);
  return rv(v,"reference","目的補正（"+(d==="gain"?"増量":d==="lose"?"減量":"維持")+"）",{
    formula:"増量 +"+GA.gain+" / 維持 "+GA.keep+" / 減量 "+GA.lose+"（一般値(仮)・DEED式に差し替え予定）",
    premise:"減量"+GA.lose+"kcalは1日約500kcal減＝週約0.5kgの健康的減量に対応。ただし基礎代謝"+b.value+"kcalと性別下限"+fl+"kcalは割らない（健康ガード）。",
    citation:"Harvard Health / NIH（健康的減量 週0.5–1kg・1日約500kcal減）"
  });
}
function targetKcal(p){
  var F=DEED_FORMULA;
  var t=tdee(p).value, d=goalDir(p), b=bmr(p).value, fl=sexFloor(p.profile.sex);
  var floorVal=Math.max(Math.round(t*F.kcalFloor.tdeeRatio), fl, b), v, guarded=false;
  if(d==="gain") v=t+F.goalAdjust.gain;
  else if(d==="maintain") v=t+F.goalAdjust.keep;
  else { var raw=t+F.goalAdjust.lose; v=Math.max(raw, floorVal); if(raw<floorVal) guarded=true; }
  var premise = guarded
    ? (F.goalAdjust.lose)+"適用後 "+(t+F.goalAdjust.lose)+"kcal が下限 "+floorVal+"kcal（TDEEの"+Math.round(F.kcalFloor.tdeeRatio*100)+"%="+Math.round(t*F.kcalFloor.tdeeRatio)+" / 基礎代謝="+b+" / 性別下限="+fl+" の最大）を下回るため、健康ガードで "+v+"kcal に引き上げ。黙って丸めず明示。"
    : "TDEE("+t+") に目的補正を合算。基礎代謝"+b+"kcalと性別下限"+fl+"kcalは割らない。";
  var out=rv(v,"reference","推奨カロリー",{
    formula:"TDEE + 目的補正（減量は max(TDEE−500, TDEE80%, 基礎代謝, 性別下限)）",
    premise:premise
  });
  out.guarded=guarded; out.floorVal=floorVal; return out;
}
function targetProtein(p){
  var d=goalDir(p), w=p.body.weight, gw=p.goal.targetWeight, base;
  if(d==="gain") base=Math.max(gw!=null?gw:w, w);
  else if(gw!=null && gw>0) base=Math.max(gw, w*0.9);
  else base=w;
  var PR=DEED_FORMULA.protein;
  var perKg=(d==="gain")?PR.perKgGain:PR.perKgDefault, raw=Math.round(base*perKg), v=Math.min(raw,PR.capG), capped=raw>PR.capG;
  return rv(v,"reference","たんぱく質目安",{
    formula:"基準体重 × "+PR.perKgDefault+"（減量・維持）/ "+PR.perKgGain+"（増量）、上限"+PR.capG+"g（一般値(仮)）",
    premise:"基準体重は "+round1(base)+"kg（"+(d==="gain"?"増量時は目標と現体重の高い方":"減量時は目標体重と現体重の90%の高い方＝筋量維持のため")+"）。"+(capped?"上限"+PR.capG+"gで頭打ち。":""),
    citation:"高たんぱく＋食物繊維で満腹感（PMC）"
  });
}
function targetFat(p,kcal){
  var FR=DEED_FORMULA.fatRatio;
  return rv(Math.round((kcal*FR)/9),"reference","脂質目安",{
    formula:"総kcal×"+Math.round(FR*100)+"%÷9kcal/g", premise:"脂質比率"+Math.round(FR*100)+"%は一般的な健康域の目安（一般値(仮)・DEED式に差し替え予定）。"
  });
}
function targetCarb(p,kcal,protein,fat){
  var carbKcal=kcal - protein*4 - fat*9, v=Math.max(Math.round(carbKcal/4),0), clamped=carbKcal<0;
  return rv(v,"reference","炭水化物（残り）",{
    formula:"(総kcal − たんぱく質kcal − 脂質kcal) ÷ 4",
    premise:"PFCのうち残りを炭水化物に充当。"+(clamped?"たんぱく質と脂質で総カロリーに達したため炭水化物0。":"")
  });
}
function bmiVal(p){
  var W=p.body.weight, H=p.body.height/100;
  return rv(round1(W/(H*H)),"reference","BMI",{
    formula:"体重 ÷ 身長(m)²", premise:"あなたの入力（体重"+W+"kg・身長"+p.body.height+"cm）から自動算出。"
  });
}
function bodyFatMass(p){
  if(p.body.bodyFatPct==null) return null;
  return rv(round1(p.body.weight*p.body.bodyFatPct/100),"input","体脂肪量",{});
}
function leanBodyMass(p){
  var fm=bodyFatMass(p); if(fm==null) return null;
  return rv(round1(p.body.weight-fm.value),"reference","除脂肪体重",{
    formula:"体重 − 体脂肪量", premise:"体重"+p.body.weight+"kg − 体脂肪量"+fm.value+"kg。"
  });
}
function plannedPace(p){
  var gw=p.goal.targetWeight, w=p.body.weight, wk=weeksUntil(p.goal.deadline);
  if(gw==null || !wk) return null;
  return rv(round2(Math.abs(w-gw)/wk),"input","想定ペース",{});
}
function safePace(p){
  var SP=DEED_FORMULA.safePace;
  var d=goalDir(p), w=p.body.weight;
  var byRate=(d==="gain")?w*SP.gainPctPerWeek:w*SP.losePctPerWeek, byAbs=(d==="gain")?SP.gainAbsKg:SP.loseAbsKg;
  return rv(round2(Math.min(byRate,byAbs)),"reference","安全ペース",{
    formula:(d==="gain"?"min(体重×"+(SP.gainPctPerWeek*100)+"%/週, "+SP.gainAbsKg+"kg/週)（増量）":"min(体重×"+(SP.losePctPerWeek*100)+"%/週, "+SP.loseAbsKg+"kg/週)（減量）"),
    premise:"健康的な体重変化の上限。体重"+w+"kg基準。",
    citation:"健康的減量 週0.5–1kg・体重1%まで（Harvard Health等）"
  });
}
function paceVerdict(p){
  var pl=plannedPace(p), sf=safePace(p);
  var planned=pl?pl.value:null, safe=sf.value, tooFast=planned!=null && planned>safe;
  return { tooFast:tooFast, plannedKg:planned, safeKg:safe, overBy:tooFast?round2(planned-safe):0 };
}
function safeWeeksNeeded(p){
  var gw=p.goal.targetWeight, w=p.body.weight, sf=safePace(p).value;
  if(gw==null || sf<=0) return null;
  return Math.ceil(Math.abs(w-gw)/sf);
}
function healthGuard(p){
  var b=bmiVal(p).value;
  if(b<16) return { level:"block", bmi:b, msg:"安全のため、この目標は受け付けられません。BMI"+b+"は医療的サポートが必要な領域とされます。専門医にご相談ください。", allowGoal:false };
  if(b<17) return { level:"doctor", bmi:b, msg:"BMI"+b+"は低体重域です。減量目標の前に医師相談をおすすめします。", allowGoal:true };
  if(b<18.5) return { level:"warn", bmi:b, msg:"BMI"+b+"はやや低めです。減量より維持・筋量増加が向いている可能性があります。", allowGoal:true };
  return { level:"ok", bmi:b, allowGoal:true };
}
function muscleNote(p){
  var w=p.body.weight, m=p.body.muscle;
  if(m==null || !w) return "";
  var r=m/w, pct=Math.round(r*100);
  if(r>=0.50) return "筋肉量"+m+"kg（体重比"+pct+"%）。筋肉がしっかりついており、土台は良好です。";
  if(r>=0.42) return "筋肉量"+m+"kg（体重比"+pct+"%）。標準的なバランス。維持しながら進めましょう。";
  return "筋肉量"+m+"kg（体重比"+pct+"%）。やや少なめ。筋量維持・増加を意識すると代謝が保たれます。";
}
function buildTrainingSuggestion(p){
  var habits=p.life.habits, none=p.life.none, d=goalDir(p);
  var actLabel=ACTIVITY[String(p.life.activity)]?ACTIVITY[String(p.life.activity)].label:"";
  var hasCardio=habits.some(function(h){ return h.key==="running"||h.key==="walking"; });
  var summary = (none||habits.length===0) ? "今は運動習慣なし" : "今は "+habits.map(function(h){ return HABITS[h.key]+" 週"+h.perWeek+"回"; }).join("／");
  var head = (none||habits.length===0) ? "まずは無理なく始めるなら、" : "いまの〈"+habits.map(function(h){ return HABITS[h.key]+" 週"+h.perWeek+"回"; }).join("／")+"〉に足すなら、";
  var body;
  if(d==="lose"){
    body = hasCardio
      ? "有酸素はそのまま維持し、筋量維持のための自重補強（スクワット・腕立て等）を週+1〜2回。減量目的なので食事の管理を主軸に、運動は除脂肪体重を守る役割で。"
      : "ウォーキングや軽い有酸素を週+2回から。あわせて自重トレを週+1回で筋量を守ると、減らした体重がリバウンドしにくくなります。";
  } else if(d==="gain"){
    body = "レジスタンス（筋トレ）の頻度を週+1回、主要種目を少しずつ漸進的に重く。"+(hasCardio?"有酸素はやや控えめにし、回復と栄養を優先すると増量が乗りやすいです。":"栄養（特にたんぱく質と総カロリー）を確保するのが増量の鍵です。");
  } else {
    body = "今の習慣の質を保ちつつ、ストレッチ・可動性トレを週2回足すと、ケガ予防と体の動かしやすさが上がります。";
  }
  var actAdd="";
  if(p.life.activity===1.2) actAdd=" 座り仕事中心とのことなので、日常の歩数（こまめに歩く）も効きます。";
  else if(p.life.activity===1.725) actAdd=" すでに高頻度なので、週1の回復日と睡眠の確保も忘れずに。";
  return {
    headline:"D.Dからの提案",
    body: head+body+actAdd+" — これは提案です。体調と相談して調整を。",
    basisLabel:"〔あなたの運動習慣に基づく提案〕「"+summary+"」＋目的("+(d==="gain"?"増量":d==="lose"?"減量":"維持")+")＋活動("+actLabel+")"
  };
}
function ddMessage(p, ctx){
  ctx=ctx||{};
  var pv=paceVerdict(p);
  var tk=ctx.targetKcal||(p.result?{value:p.result.recommended, guarded:p.result.guarded}:null);
  var d=goalDir(p);
  var delta=(p.goal.targetWeight!=null)?round1(Math.abs(p.body.weight-p.goal.targetWeight)):null;
  if(pv.tooFast){
    var sw=safeWeeksNeeded(p), sd=(sw!=null)?fmtJP(addDaysISO(todayISO(),sw*7)):"";
    return "正直に言う。目標から逆算すると週"+pv.plannedKg+"kg。健康的な上限は週"+pv.safeKg+"kg、"+pv.overBy+"kgオーバーしてる。期限を"+sw+"週（"+sd+"以降）に延ばすか、目標をゆるめると無理がないよ。";
  }
  if(tk && tk.guarded){
    return "カロリーは下げすぎない。きみの基礎代謝は割らせない。推奨"+tk.value+"kcalは健康を守るための下限つきだ。";
  }
  var streak=ctx.streak!=null?ctx.streak:currentStreak();
  if(streak>=3 && delta!=null) return streak+"日連続、効いてる。この調子で目的（"+(d==="gain"?"+":"−")+delta+"kg）に近づこう。";
  if(ctx.streakBroken) return "昨日は休んだね。大丈夫、今日1個チェックすれば戻れる。";
  return "いい設定だ。無理がない。今日のチェックからいこう。";
}
function buildAnalysis(p){
  var b=bmr(p), af=activityFactor(p), td=tdee(p), adj=goalAdjust(p), tk=targetKcal(p);
  var prot=targetProtein(p), fat=targetFat(p,tk.value), carb=targetCarb(p,tk.value,prot.value,fat.value);
  var bmi=bmiVal(p), fm=bodyFatMass(p), lbm=leanBodyMass(p), pp=plannedPace(p), sp=safePace(p);
  var pv=paceVerdict(p), guard=healthGuard(p), train=buildTrainingSuggestion(p);
  return {
    bmr:b, activityFactor:af, tdee:td, goalAdjust:adj, targetKcal:tk,
    protein:prot, fat:fat, carb:carb, bmi:bmi, bodyFatMass:fm, leanBodyMass:lbm,
    plannedPace:pp, safePace:sp, paceVerdict:pv, guard:guard, training:train,
    recommended:tk.value, guarded:tk.guarded, floorApplied:tk.floorVal, proteinG:prot.value
  };
}
function currentStreak(){
  var days=state.streakDays.slice().sort();
  if(days.length===0) return 0;
  var t=todayISO(), y=addDaysISO(t,-1), last=days[days.length-1];
  if(last!==t && last!==y) return 0;
  var set={}; days.forEach(function(d){ set[d]=true; });
  var count=0, cur=last;
  while(set[cur]){ count++; cur=addDaysISO(cur,-1); }
  return count;
}

/* ---- STEP2 体組成（水分/骨量なし・部分更新） ---- */
var BC_FIELDS=[
  {k:"height", label:"身長", unit:"cm", calc:false, min:120, max:220},
  {k:"weight", label:"体重", unit:"kg", calc:false, min:30, max:200},
  {k:"bmi",    label:"BMI", unit:"", calc:true},
  {k:"bodyFatPct", label:"体脂肪率", unit:"%", calc:false, min:3, max:60},
  {k:"fatmass", label:"体脂肪量", unit:"kg", calc:true},
  {k:"muscle", label:"筋肉量", unit:"kg", calc:false, min:20, max:120}
];
function viewStep2(){
  var edited=state.body.edited;
  return ''+
  topbar("step1",null)+stepper(2)+
  '<div class="scroll">'+
    '<h1 class="title">体組成</h1><div class="subtitle">担当トレーナーが計測しました。</div>'+
    '<div class="measured-by"><div class="avatar">健</div><div class="mb-info"><b>佐藤 健</b><div>DEED 新宿東口店 ・ 計測日: 2026-06-28</div></div><div class="ok-badge">計測済み</div></div>'+
    '<div style="display:flex; justify-content:flex-end; margin-bottom:8px;"><div class="switch'+(edited?' on':'')+'" onclick="toggleEdit()"><span>編集する</span><span class="track"><span class="knob"></span></span></div></div>'+
    '<div id="bcGrid"></div>'+
    '<div class="micro" style="margin-top:8px;">数値はデモ用のダミーです。実際の計測値ではありません。</div>'+
  '</div>'+
  '<div class="footer-cta"><button class="btn secondary" onclick="go(\'step1\')">← 戻る</button><button class="btn primary" onclick="nextStep2()">次へ</button></div>';
}
afterRender.step2=function(){ buildBC(); };
function bcDerived(){
  var b=state.body;
  return { bmi:round1(b.weight/((b.height/100)*(b.height/100))), fatmass:round1(b.weight*b.bodyFatPct/100) };
}
function bandConfig(k){
  var sex=state.profile.sex, w=state.body.weight;
  if(k==="bmi") return { min:14, max:36, labs:["低","標準","高"],
    segs:[{from:14,to:18.5,c:"var(--info)"},{from:18.5,to:25,c:"var(--ok)"},{from:25,to:30,c:"var(--warn)"},{from:30,to:36,c:"var(--danger)"}],
    verdict:function(v){ if(v<18.5) return ["低体重","var(--info)"]; if(v<25) return ["標準","var(--ok)"]; if(v<30) return ["やや高","var(--warn)"]; return ["高","var(--danger)"]; } };
  if(k==="bodyFatPct"){
    if(sex==="f") return { min:10, max:45, labs:["低","標準","高"],
      segs:[{from:10,to:20,c:"var(--info)"},{from:20,to:30,c:"var(--ok)"},{from:30,to:35,c:"var(--warn)"},{from:35,to:45,c:"var(--danger)"}],
      verdict:function(v){ if(v<20) return ["低め","var(--info)"]; if(v<=30) return ["標準","var(--ok)"]; if(v<=35) return ["やや高","var(--warn)"]; return ["高","var(--danger)"]; } };
    return { min:5, max:40, labs:["低","標準","高"],
      segs:[{from:5,to:10,c:"var(--info)"},{from:10,to:20,c:"var(--ok)"},{from:20,to:25,c:"var(--warn)"},{from:25,to:40,c:"var(--danger)"}],
      verdict:function(v){ if(v<10) return ["低め","var(--info)"]; if(v<=20) return ["標準","var(--ok)"]; if(v<=25) return ["やや高","var(--warn)"]; return ["高","var(--danger)"]; } };
  }
  if(k==="muscle") return { min:w*0.30, max:w*0.60, labs:["低","標準","高"],
    segs:[{from:w*0.30,to:w*0.40,c:"var(--info)"},{from:w*0.40,to:w*0.50,c:"var(--ok)"},{from:w*0.50,to:w*0.60,c:"var(--warn)"}],
    verdict:function(v){ var r=v/w; if(r<0.40) return ["やや少","var(--info)"]; if(r<=0.50) return ["標準","var(--ok)"]; return ["多い","var(--warn)"]; } };
  return null;
}
function bandHTML(k,val){
  var cfg=bandConfig(k); if(!cfg) return "";
  var span=cfg.max-cfg.min;
  var segHTML=cfg.segs.map(function(s){
    return '<div class="seg-c" style="left:'+(((s.from-cfg.min)/span)*100)+'%; width:'+(((s.to-s.from)/span)*100)+'%; background:'+s.c+';"></div>';
  }).join("");
  var pos=Math.max(0,Math.min(100,((val-cfg.min)/span)*100));
  var outside=val<cfg.min||val>cfg.max, vd=cfg.verdict(val);
  return '<div class="band'+(outside?' warn':'')+'" data-dot="'+k+'">'+segHTML+'<div class="dot-m" style="left:'+pos+'%;"></div></div>'+
    '<div class="band-labs"><span>'+cfg.labs[0]+'</span><span>'+cfg.labs[1]+'</span><span>'+cfg.labs[2]+'</span></div>'+
    '<div class="verdict" data-verdict="'+k+'" style="color:'+vd[1]+'">'+vd[0]+'</div>';
}
function buildBC(){
  var grid=document.getElementById("bcGrid"); if(!grid) return;
  grid.innerHTML="";
  var edited=state.body.edited, der=bcDerived();
  BC_FIELDS.forEach(function(f){
    var card=document.createElement("div"); card.className="metric-card";
    var val=f.calc?der[f.k]:state.body[f.k];
    var top='<div class="mc-top"><span class="mc-lab">'+esc(f.label)+'</span>'+(f.calc?'<span class="auto-badge">自動</span>':'')+'</div>';
    var valHTML;
    if(f.calc) valHTML='<div class="mc-val"><span class="v" data-calc="'+f.k+'">'+val+'</span><span class="u">'+f.unit+'</span></div>';
    else if(edited) valHTML='<div style="margin-top:6px;"><input class="inp" type="text" inputmode="decimal" data-k="'+f.k+'" value="'+val+'"></div>';
    else valHTML='<div class="mc-val"><span class="v">'+val+'</span><span class="u">'+f.unit+'</span></div>';
    var bar="";
    if(f.k==="bmi"||f.k==="bodyFatPct"||f.k==="muscle") bar=bandHTML(f.k, f.calc?der[f.k]:state.body[f.k]);
    if(f.k==="fatmass") bar='<div class="micro" style="margin-top:6px;">体脂肪率 × 体重 から自動算出</div>';
    card.innerHTML=top+valHTML+bar;
    grid.appendChild(card);
    if(!f.calc && edited){
      var inp=card.querySelector("input[data-k]");
      inp.addEventListener("input", function(){
        var v=parseFloat(inp.value);
        if(!isNaN(v)){ state.body[inp.dataset.k]=v; save(); }
        updateBCDerived();
      });
      inp.addEventListener("blur", function(){
        var f2=BC_FIELDS.filter(function(x){ return x.k===inp.dataset.k; })[0];
        var v=parseFloat(inp.value);
        if(isNaN(v)) return;
        if(f2 && (v<f2.min || v>f2.max)) toast(f2.label+"は"+f2.min+"〜"+f2.max+f2.unit+"の範囲で入力してください");
      });
    }
  });
  updateBCDerived();
}
function updateBCDerived(){
  var grid=document.getElementById("bcGrid"); if(!grid) return;
  var der=bcDerived();
  var bmiCell=grid.querySelector('[data-calc="bmi"]'); if(bmiCell && !isNaN(der.bmi)) bmiCell.textContent=der.bmi;
  var fmCell=grid.querySelector('[data-calc="fatmass"]'); if(fmCell && !isNaN(der.fatmass)) fmCell.textContent=der.fatmass;
  ["bmi","bodyFatPct","muscle"].forEach(function(k){
    var cfg=bandConfig(k); if(!cfg) return;
    var val=(k==="bmi")?der.bmi:state.body[k];
    if(val==null||isNaN(val)) return;
    var band=grid.querySelector('.band[data-dot="'+k+'"]');
    if(band){
      var span=cfg.max-cfg.min, pos=Math.max(0,Math.min(100,((val-cfg.min)/span)*100));
      var dot=band.querySelector(".dot-m"); if(dot) dot.style.left=pos+"%";
      band.classList.toggle("warn", val<cfg.min||val>cfg.max);
    }
    var vd=cfg.verdict(val), vEl=grid.querySelector('[data-verdict="'+k+'"]');
    if(vEl){ vEl.textContent=vd[0]; vEl.style.color=vd[1]; }
  });
}
function toggleEdit(){ state.body.edited=!state.body.edited; save(); render(); }
function nextStep2(){
  var b=state.body;
  /* BC_FIELDSのmin/maxを唯一の基準として参照（blur警告の案内範囲とゲートの不一致を防ぐ） */
  var outOfRange=BC_FIELDS.some(function(f){
    if(f.calc) return false;
    var v=b[f.k];
    return typeof v!=="number" || !isFinite(v) || v<f.min || v>f.max;
  });
  if(outOfRange){ toast("計測値が範囲外です。確認してください"); return; }
  if(typeof b.muscle==="number" && typeof b.weight==="number" && b.muscle>b.weight){ toast("筋肉量が体重を超えています。確認してください"); return; }
  save(); go("step3");
}

function toggleHabit(k){

/* ---- 解析中 ---- */
function viewAnalyzing(){
  return '<div class="analyzing-wrap"><div class="ring" id="ring"><div class="inner">D.D</div></div><div class="analyzing-text" id="anText">基礎代謝を計算しています…</div></div>';

afterRender.analyzing=function(){
  var ring=document.getElementById("ring"), anText=document.getElementById("anText");
  var msgs=["基礎代謝を計算しています…","活動レベルを反映しています…","あなたの運動習慣を見ています…","安全なペースを確認しています…"];
  var reduced=window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var dur=reduced?300:1800, start=null, done=false;
  function finish(){ if(done) return; done=true; go("result"); }
  ring.onclick=finish;
  function step(ts){
    if(start===null) start=ts;
    var t=Math.min(1,(ts-start)/dur);
    ring.style.background="conic-gradient(var(--accent) "+(t*360)+"deg, var(--surface-3) 0)";
    var mi=Math.min(msgs.length-1, Math.floor(t*msgs.length));
    if(anText) anText.textContent=msgs[mi];
    if(t<1) requestAnimationFrame(step); else setTimeout(finish, reduced?0:150);
  }
  requestAnimationFrame(step);
};

function srcChip(type,label,tip){

}

    (opt.note?'<div class="micro" style="margin-top:4px;">'+esc(opt.note)+'</div>':'')+'<div class="srcchips">'+chips+'</div></div>';
}
function viewResult(){
  var a=buildAnalysis(state), p=state, sx=p.profile.sex;

function ensureToday(){
  var t=todayISO();
  if(state.today.date!==t){ state.today={date:t, checks:[false,false,false]}; save(); }
}
var MILESTONES=[7,30,90];
function milestoneInfo(streak, seen){
  var achieved=MILESTONES.filter(function(m){ return streak>=m; });
  var next=null, remaining=null, newly=null;
  for(var i=0;i<MILESTONES.length;i++){ if(streak<MILESTONES[i]){ next=MILESTONES[i]; remaining=MILESTONES[i]-streak; break; } }
  for(var j=0;j<achieved.length;j++){ if(seen.indexOf(achieved[j])<0){ newly=achieved[j]; break; } }
  return { achieved:achieved, next:next, remaining:remaining, newly:newly };
}
/* 写真リマインド（決定的ルール）: 月の1〜7日 かつ 最新写真が今月でない（またはなし） */
function needPhotoReminder(tISO, photos){
  var day=parseInt(tISO.slice(8,10),10);
  if(day<1 || day>7) return false;
  if(!photos || !photos.latest) return true;
  return photos.latest.date.slice(0,7)!==tISO.slice(0,7);
}

/* 汎用折れ線グラフ（自前inline SVG・外部ライブラリなし）
   points: [{date,val}] / opts: {goal:number|null（目標破線・体重のみ）, emptyMsg} */
function drawLineChart(host, pointsIn, opts){
  opts=opts||{};
  if(!host) return;
  var data=pointsIn.slice().sort(function(a,b){ return a.date<b.date?-1:1; });
  if(data.length===0){ host.innerHTML='<div class="muted small">'+esc(opts.emptyMsg||"記録するとここに推移が出ます。")+'</div>'; return; }
  var W=320,H=140,padL=34,padR=12,padT=12,padB=22;
  var vals=data.map(function(d){return d.val;}), gw=(opts.goal!=null)?opts.goal:null;
  var allVals=vals.slice(); if(gw!=null) allVals.push(gw);
  var minV=Math.min.apply(null,allVals), maxV=Math.max.apply(null,allVals);
  if(minV===maxV){ minV-=1; maxV+=1; }
  var padv=(maxV-minV)*0.1||1; minV-=padv; maxV+=padv;
  function X(i){ return data.length<=1? padL+(W-padL-padR)/2 : padL+(i/(data.length-1))*(W-padL-padR); }
  function Y(v){ return padT+(1-(v-minV)/(maxV-minV))*(H-padT-padB); }
  var ns="http://www.w3.org/2000/svg";
  var svg=document.createElementNS(ns,"svg"); svg.setAttribute("viewBox","0 0 "+W+" "+H);
  if(gw!=null){
    var gl=document.createElementNS(ns,"line");
    gl.setAttribute("x1",padL); gl.setAttribute("x2",W-padR); gl.setAttribute("y1",Y(gw)); gl.setAttribute("y2",Y(gw));
    gl.setAttribute("stroke","var(--ok)"); gl.setAttribute("stroke-width","1.2"); gl.setAttribute("stroke-dasharray","4 3");
    svg.appendChild(gl);
    var gt=document.createElementNS(ns,"text");
    gt.setAttribute("x",W-padR); gt.setAttribute("y",Y(gw)-3); gt.setAttribute("text-anchor","end"); gt.setAttribute("font-size","9"); gt.setAttribute("fill","var(--ok)"); gt.textContent="目標"+gw;
    svg.appendChild(gt);
  }
  [minV,maxV].forEach(function(v){
    var tx=document.createElementNS(ns,"text");
    tx.setAttribute("x",padL-4); tx.setAttribute("y",Y(v)+3); tx.setAttribute("text-anchor","end"); tx.setAttribute("font-size","9"); tx.setAttribute("fill","var(--text-3)"); tx.textContent=round1(v);
    svg.appendChild(tx);
  });
  if(data.length>1){
    var dpath=""; data.forEach(function(d,i){ dpath+=(i===0?"M":"L")+X(i)+" "+Y(d.val)+" "; });
    var path=document.createElementNS(ns,"path");
    path.setAttribute("d",dpath); path.setAttribute("fill","none"); path.setAttribute("stroke","var(--accent)"); path.setAttribute("stroke-width","2"); path.setAttribute("stroke-linejoin","round"); path.setAttribute("stroke-linecap","round");
    svg.appendChild(path);
  }
  data.forEach(function(d,i){
    var last=i===data.length-1;
    var c=document.createElementNS(ns,"circle");
    c.setAttribute("cx",X(i)); c.setAttribute("cy",Y(d.val)); c.setAttribute("r",last?4:3); c.setAttribute("fill","var(--accent)");
    if(last){ c.setAttribute("stroke","#fff"); c.setAttribute("stroke-width","1.5"); }
    svg.appendChild(c);
    if(last){
      var lt=document.createElementNS(ns,"text");
      lt.setAttribute("x",X(i)); lt.setAttribute("y",Y(d.val)-8); lt.setAttribute("text-anchor","middle"); lt.setAttribute("font-size","10"); lt.setAttribute("font-weight","700"); lt.setAttribute("fill","var(--accent)"); lt.textContent=d.val;
      svg.appendChild(lt);
    }
  });
  var xl=[[0,data[0].date]]; if(data.length>1) xl.push([data.length-1,data[data.length-1].date]);
  xl.forEach(function(pp){
    var tx=document.createElementNS(ns,"text");
    tx.setAttribute("x",X(pp[0])); tx.setAttribute("y",H-6); tx.setAttribute("text-anchor",pp[0]===0?"start":"end"); tx.setAttribute("font-size","9"); tx.setAttribute("fill","var(--text-3)"); tx.textContent=fmtJP(pp[1]);
    svg.appendChild(tx);
  });
  host.innerHTML=""; host.appendChild(svg);
}
function renderWeightChart(hostId, sumId){
  var host=document.getElementById(hostId||"weightChart"); if(!host) return;
  var data=state.weights.slice();
  if(data.length===0) data=[{date:todayISO(), val:state.body.weight}];
  drawLineChart(host, data, {goal:state.goal.targetWeight, emptyMsg:"記録するとここに推移が出ます。"});
  var sum=document.getElementById(sumId||"weightSummary");
  if(sum){
    if(state.weights.length<=1 && data.length<=1){ sum.innerHTML='<span class="muted">記録を続けると推移が見えます。</span>'; }
    else {
      var first=data[0].val, lastv=data[data.length-1].val, diff=round1(lastv-first), purpose=state.goal.purpose;
      var good=(purpose==="cut"&&diff<0)||(purpose==="bulk"&&diff>0)||(purpose==="keep"&&Math.abs(diff)<1);
      var col=good?"var(--ok)":"var(--warn)";
      sum.innerHTML='開始'+first+'kg → 最新'+lastv+'kg（<span style="color:'+col+'; font-weight:700;">'+(diff>0?"+":"")+diff+'kg</span>）〔あなたの入力〕';
    }
  }
}

function upsertGirth(dateISO, waist, chest){

  else state.girths.push({date:dateISO, waist:waist, chest:chest});
  state.girths.sort(function(a,b){ return a.date<b.date?-1:1; });
}

    var delta=state.goal.targetWeight!=null?round1(Math.abs(state.body.weight-state.goal.targetWeight)):null, dir=goalDir(state);
    var greet="やあ、D.Dだ。きみの推奨は"+(r.recommended||"-")+"kcal";
    if(delta!=null) greet+="、目標は"+(dir==="gain"?"+":"−")+delta+"kg";
    greet+="。続けるコツでも、つまずきでも、なんでも聞いて。";
    state.chat.push({role:"dd", text:greet}); save();
  }
  var msgs=state.chat.map(function(m){ return '<div class="msg '+(m.role==="dd"?"dd":"me")+'">'+esc(m.text)+'</div>'; }).join("");
  var quick=["食事写真見て","献立を提案して","今日は外食","停滞期がつらい","夜お腹がすく","運動が続かない","このペースで合ってる？"].map(function(q){
    return '<button class="chip" onclick="sendQuick(\''+esc(q)+'\')">'+esc(q)+'</button>';
  }).join("");
  return ''+
  '<div class="chat-head"><div class="c-av">D.D</div><div><b>D.D（ディディ）</b><div class="c-sub"><span class="on-dot"></span>DEEDのAIトレーナー</div></div><button class="gear" style="margin-left:auto;" onclick="goTab(\'settings\')">⚙</button></div>'+
  '<div class="chat-scroll" id="chatScroll">'+msgs+'</div>'+

function respond(userText){
  var r=state.result||{}, pv=paceVerdict(state);
  var delta=state.goal.targetWeight!=null?round1(Math.abs(state.body.weight-state.goal.targetWeight)):null;
  var gwLabel=state.goal.targetWeight!=null?state.goal.targetWeight+"kg":"目標体重", reply;
  if(/写真|添削/.test(userText)){
    reply="食事の記録は🍽食事タブからどうぞ。写真＋タグで記録すれば、その場で僕が添削する。（デモでは写真の中身は解析せず、あなたが選んだタグから判断するよ）下のタブから食事へ移動して。";
  } else if(/献立|メニュー|何食べ/.test(userText)){
    var remC=state.result?remainingKcalOf(state.result, state.meals, todayISO()):null;
    reply=(remC!=null?"今日の残りは概算約"+remC+"kcal（あなたが選んだタグからの概算）。":"")+"🍽食事タブの献立提案で、使いたい食材から2-3件出せる。数値は一般的な栄養概算〔目安〕だ。";
  } else if(/外食|飲み会|コンビニ/.test(userText)){
    reply="外食は敵じゃない。選び方の試験だ。①メインは肉か魚の焼き物・刺身系 ②揚げ物と〆の主食はどちらか片方まで ③帰ったらタグだけでも記録。なかったことにする方が問題だ。楽しんでこい。";
  } else if(/食べてない|食べていない|抜いた|断食|1日1食/.test(userText)){
    reply="それは頑張りじゃない。基礎代謝"+(r.bmr||"-")+"kcal〔目安・一般値(仮)〕を割る食べ方は、僕は認めない。減らすんじゃなく、たんぱく質"+(r.protein||"-")+"gを先に確保しろ。今日戻せば済む話だ。（極端な減食は勧めない。体調が悪い時は専門家へ）";
  } else if(/怒って|厳しく/.test(userText)){
    var lastStrict=state.strictLog.length?state.strictLog[state.strictLog.length-1]:null;
    reply=lastStrict?("僕が最後に言ったのはこれだ——「"+lastStrict.text+"」。言うべきことはもう言った。あとはやるだけだ。"):"今のところ叱る材料がない。それが一番いい状態だ。";
  } else if(/停滞|減らない|止まった|変わらない/.test(userText)){
    reply="停滞期は正常な反応だよ。体重は水分・便・グリコーゲンで日々±1kgは揺れる。1日の数字に一喜一憂せず、2週間の平均で見よう。たんぱく質"+(r.protein||"-")+"gと睡眠を守れば、また動き出すことが多い。";
  } else if(/ペース|速い|合っ|大丈夫か|間に合/.test(userText)){
    if(pv.tooFast){
      var sw=safeWeeksNeeded(state), sd=fmtJP(addDaysISO(todayISO(),sw*7));
      reply="正直に言う。週"+pv.plannedKg+"kgは速すぎる。健康的な上限は週"+pv.safeKg+"kgまで、"+pv.overBy+"kgオーバーしてる。期限を"+sw+"週（"+sd+"以降）に延ばすのがおすすめだ。きみの体を守るのが俺の仕事だからね。";
    } else {
      reply="今のペースは週"+(pv.plannedKg!=null?pv.plannedKg:"-")+"kg、安全の目安は週"+pv.safeKg+"kgまで。無理のない範囲に収まってる。この調子でいこう。";
    }
  } else if(/続かない|モチベ|つらい|やる気|サボ/.test(userText)){
    reply="なぜ始めたか思い出そう。きみの目標は"+gwLabel+"、"+(delta!=null?(goalDir(state)==="gain"?"+":"−")+delta+"kg":"その一歩")+"だ。完璧じゃなくていい。今日のチェックを1つだけでも、ゼロとは全然違う。目的は見失わないでいこう。";
  } else if(/食べ過ぎ|夜|間食|お腹|空腹|甘い/.test(userText)){
    reply="我慢より置き換えが続くコツ。たんぱく質"+(r.protein||"-")+"gを日中に先取りすると夜の空腹が和らぐ。どうしてもなら高たんぱく・低糖質の間食を。（これは一般的な情報で、医療助言ではないよ）";
  } else if(/ジム|メニュー|トレ|筋トレ|運動|有酸素/.test(userText)){
    reply=(r.training?r.training:"今の習慣に足す形で組むのがいい。")+" 詳しいフォームやメニューは、担当の佐藤さん（DEED新宿東口店）に相談すると確実だよ。";
  } else {
    reply="いい質問だね。まずは今日のチェックを1つ。目的は"+gwLabel+"、そこは見失わないでいこう。気になることがあれば、ペースのこと・食事のこと・続け方、なんでも聞いて。";
  }
  state.chat.push({role:"dd", text:reply}); save(); render();
}

/* ============================================================
   🍽 食事エンジン（v3）— タグベースの決定的添削・献立提案・写真
   デモでは写真の中身は解析しない（本番はAI解析）。全コメントは
   「選んだタグ×量×時間帯×推奨カロリー」から決定的に生成する。
   ============================================================ */
var MEAL_TAGS={ staple:"主食", meatfish:"肉・魚", veg:"野菜", fried:"揚げ物", sweet:"甘い物", alcohol:"お酒" };
var MEAL_SLOTS={ morning:"朝", noon:"昼", evening:"夜", snack:"間食" };
var MEAL_AMOUNTS={ low:"少なめ", mid:"ふつう", high:"多め" };
/* 〔目安・出典: 一般的な食品栄養概算。個々の食事の実測ではありません〕 */
var MEAL_TAG_KCAL={
  staple:  {low:150, mid:250, high:400},
  meatfish:{low:150, mid:250, high:400},
  veg:     {low: 30, mid: 60, high:100},
  fried:   {low:200, mid:350, high:550},
  sweet:   {low:100, mid:200, high:350},
  alcohol: {low:100, mid:200, high:400}
};
var HONEST_TEXT="このデモでは写真の中身は解析していません（本番はAIが写真を解析して添削します）。コメントは、あなたが選んだタグ・時間帯・量と、あなたの推奨カロリー/たんぱく質目安〔一般値(仮)〕から生成しています。";
function estMealKcal(meal){
  return meal.tags.reduce(function(s,t){ return s+(MEAL_TAG_KCAL[t]?MEAL_TAG_KCAL[t][meal.amount]:0); },0);
}
function mealsOn(meals, dateISO){ return meals.filter(function(m){ return m.date===dateISO; }); }
function estDayKcal(meals, dateISO){ return mealsOn(meals,dateISO).reduce(function(s,m){ return s+estMealKcal(m); },0); }
function remainingKcalOf(result, meals, dateISO){ return (result?result.recommended:0)-estDayKcal(meals,dateISO); }
function sortMealsForLog(meals){
  return meals.map(function(m,i){ return {m:m,i:i}; }).sort(function(a,b){
    if(a.m.date!==b.m.date) return a.m.date<b.m.date?1:-1;
    return b.i-a.i;
  }).map(function(x){ return x.m; });
}
/* 添削コメント決定ルール表（上から評価・最初にマッチした1本＋加点行。完全決定的）
   健康ガード: 「もっと減らせ」系の文言は生成しない。S1/S2は“下げすぎを叱る”側 */
function buildMealComment(meal, todayMeals, r, bmrVal){
  var estDay=todayMeals.reduce(function(s,m){ return s+estMealKcal(m); },0);
  var estMeal=estMealKcal(meal);
  var remaining=r.recommended-estDay;
  var lowMain=todayMeals.filter(function(m){ return m.amount==="low" && m.slot!=="snack"; }).length;
  var allLow=todayMeals.every(function(m){ return m.amount==="low"; });
  var has=function(t){ return meal.tags.indexOf(t)>=0; };
  var text, severity, rule;
  if(todayMeals.length>=2 && allLow && lowMain>=2){
    rule="S1"; severity="strict";
    text="足りない。今日の概算は約"+estDay+"kcal。基礎代謝"+bmrVal+"kcalを割る食べ方は、僕は認めない。減らすより、たんぱく質"+r.protein+"gを先に満たせ。";
  } else if(meal.slot==="evening" && estDay<bmrVal){
    rule="S2"; severity="strict";
    text="今日はここまで約"+estDay+"kcal。基礎代謝"+bmrVal+"kcalに届いていない。極端に削るのは減量じゃない、消耗だ。次の食事はふつうの量で、たんぱく質から埋めろ。";
  } else if(has("fried") && meal.amount==="high" && meal.slot==="evening"){
    rule="S3"; severity="strict";
    text="夜に揚げ物を多め、正直に言うが目標に対して逆走だ。概算+"+estMeal+"kcal。明日の昼に寄せるか、量を戻そう。";
  } else if(has("sweet") && has("alcohol")){
    rule="S4"; severity="strict";
    text="甘い物とお酒の同時は概算"+estMeal+"kcal。どちらか片方に。両取りは目標が遠のく。";
  } else if(remaining<0){
    rule="W1"; severity="warn";
    text="推奨"+r.recommended+"kcalを概算で約"+Math.abs(remaining)+"kcalオーバー。今日はもう締めて、明日リセットしよう。";
  } else if(meal.slot==="snack" && meal.tags.length===1 && meal.tags[0]==="sweet"){
    rule="W2"; severity="warn";
    text="間食が甘い物だけ。たんぱく質側（ゆで卵・ヨーグルト等の一般例）に置き換えると空腹が長持ちするとされる。";
  } else if(meal.amount==="low"){
    rule="W3"; severity="warn";
    text="少なめは悪くない。ただし1日トータルで基礎代謝"+bmrVal+"kcalは割らせない。次の食事で戻すこと。";
  } else if(has("meatfish") && has("veg")){
    rule="O1"; severity="ok";
    text="いいバランスだ。たんぱく質"+r.protein+"g/日に近づく組み合わせ。こういう1食を“普通”にできる人間が、最後に勝つ。";
  } else {
    rule="O2"; severity="ok";
    text="記録OK。今日の概算はここまで約"+estDay+"kcal／推奨"+r.recommended+"kcal。配分を考えて使え。";
  }
  /* 加点行（独立発火） */
  if(has("veg") && rule!=="O1") text+=" 野菜を入れたのは良い。";
  if(meal.slot==="morning" && has("meatfish")) text+=" 朝のたんぱく質は効く。";
  var basis="タグ{"+meal.tags.map(function(t){ return MEAL_TAGS[t]; }).join("・")+"}×量{"+MEAL_AMOUNTS[meal.amount]+"}×時間帯{"+MEAL_SLOTS[meal.slot]+"}／推奨"+r.recommended+"kcal・基礎代謝"+bmrVal+"kcal（ルール表 "+rule+"）。写真は解析していません。";
  return { text:text, severity:severity, basis:basis };
}
function pushStrictLog(st, text){
  st.strictLog.push({date:todayISO(), text:text});
  while(st.strictLog.length>20) st.strictLog.shift();
}
/* ---- 献立ミニDB（内蔵30件）〔目安・出典: 一般的な栄養概算。材料・量・調理法で変わります〕
   AI生成ではなく、この固定DBを条件で絞り込むだけ（捏造ゼロ） ---- */
var INGREDIENTS={ chicken:"鶏むね", egg:"卵", tofu:"豆腐", rice:"白米", pasta:"パスタ", veg:"野菜", fish:"魚", pork:"豚肉", natto:"納豆", oats:"オートミール" };
var MENU_DB=[

/* 決定的フィルタ: 残りが少なくても300kcal級は提案する（極端減食を勧めないため） */
function suggestMenus(remaining, ingredientKeys, slot){
  var cap=Math.max(remaining, 300);
  var cand=MENU_DB.filter(function(m){
    if(m.kcal>cap+100) return false;
    if(ingredientKeys.length>0 && !m.ing.some(function(k){ return ingredientKeys.indexOf(k)>=0; })) return false;
    return true;
  });
  cand.sort(function(a,b){
    var pa=a.p/a.kcal, pb=b.p/b.kcal;
    if(pa!==pb) return pb-pa;
    if(a.kcal!==b.kcal) return a.kcal-b.kcal;
    return a.id<b.id?-1:1;
  });
  return cand.slice(0,3);
}
/* ---- 写真圧縮（FileReader/canvasのみ・通信ゼロ・唯一の非同期処理）
   EXIF回転は近年のブラウザのdecode時自動回転（image-orientation:from-image既定）に任せる簡易対応。
   縦横が変な時は撮り直し案内をガイドに記載済み ---- */
function compressImage(file, cb){
  if(!file){ cb(null); return; }
  /* file.typeが空（一部Androidカメラintent）は拒否せずデコード試行に委ねる（失敗はimg.onerrorで通知） */
  if((file.type && !/^image\//.test(file.type)) || file.size>20*1024*1024){ toast("画像ファイル（20MB以下）を選んでください"); cb(null); return; }
  var fr=new FileReader();
  fr.onerror=function(){ toast("写真を読み込めませんでした"); cb(null); };
  fr.onload=function(){
    var img=new Image();
    img.onerror=function(){ toast("この形式の写真は読み込めませんでした。別の写真をお試しください（写真なしでも記録できます）"); cb(null); };
    img.onload=function(){
      try{
        var scale=Math.min(1, 512/Math.max(img.width,img.height));
        var w=Math.max(1,Math.round(img.width*scale)), h=Math.max(1,Math.round(img.height*scale));
        var cv=document.createElement("canvas"); cv.width=w; cv.height=h;
        var ctx=cv.getContext("2d");
        ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h); /* 透過PNG→JPEG黒化防止 */
        ctx.drawImage(img,0,0,w,h);
        var out=cv.toDataURL("image/jpeg",0.7);
        if(out.length>180000) out=cv.toDataURL("image/jpeg",0.5);
        if(out.length>180000){ toast("写真が大きすぎるため保存できませんでした（記録のみ可能です）"); cb(null); return; }
        cb(out);
      }catch(e){ toast("写真を処理できませんでした"); cb(null); }
    };
    img.src=fr.result;
  };
  fr.readAsDataURL(file);
}
/* 写真は直近10件まで（超過は最古の写真のみ削除・記録テキストは残す） */
function enforcePhotoCap(silent){
  var withPhoto=state.meals.filter(function(m){ return m.photo; });
  var removed=0;
  while(withPhoto.length>10){
    var oldest=withPhoto.shift();
    oldest.photo=null; oldest.photoRemoved=true; removed++;
  }
  if(removed>0 && !silent) toast("写真は直近10件まで保存。古い写真を"+removed+"枚削除しました（記録は残ります）");
  return removed;
}

/* ============================================================
   起動 + 不変条件セルフテスト
   ============================================================ */
function runSelfTests(){
  var p={
    profile:{ name:"テスト", birth:{y:1990,m:1,d:1}, age:34, sex:"m" },
    body:{ height:172, weight:78.5, bodyFatPct:24, muscle:56.4, edited:false },
    goal:{ purpose:"cut", targetWeight:72, deadline:addDaysISO(todayISO(),60) },
    life:{ activity:1.55, habits:[{key:"running",perWeek:3}], none:false },
    streakDays:[]
  };
  var ok=true;
  function assert(c,m){ if(!c){ ok=false; if(window.console) console.warn("[SelfTest FAIL] "+m); } }
  var a=buildAnalysis(p);
  ["bmr","activityFactor","tdee","goalAdjust","targetKcal","protein","fat","carb","bmi","safePace"].forEach(function(k){
    assert(a[k] && ["input","choice","reference"].indexOf(a[k].source)>=0, "source必須:"+k);
  });
  ["bmr","tdee","goalAdjust","targetKcal","protein","fat","carb","bmi","safePace"].forEach(function(k){
    if(a[k].source==="reference") assert(a[k].formula && a[k].premise, "reference式/前提:"+k);
  });
  var threw=false;
  try{ var p0=JSON.parse(JSON.stringify(p)); p0.life.activity=null; tdee(p0); }catch(e){ threw=true; }
  assert(threw, "活動係数未選択でthrow");
  assert(a.targetKcal.value>=Math.max(Math.round(a.tdee.value*0.8),sexFloor(p.profile.sex),a.bmr.value) || a.targetKcal.value===a.tdee.value-500, "基礎代謝割れ防止");
  var pNone=JSON.parse(JSON.stringify(p)); pNone.life.habits=[]; pNone.life.none=true;
  assert(buildTrainingSuggestion(p).body!==buildTrainingSuggestion(pNone).body, "トレ提案がhabitsで変わる");
  assert(buildTrainingSuggestion(pNone).basisLabel.indexOf("運動習慣なし")>=0, "特になし起点");
  assert(JSON.stringify(buildAnalysis(p))===JSON.stringify(buildAnalysis(p)), "決定性");
  var allText=JSON.stringify(a)+buildTrainingSuggestion(p).body;
  assert(allText.indexOf("必ず痩せる")<0 && allText.indexOf("治る")<0, "薬機法禁止語なし");
  var pLow=JSON.parse(JSON.stringify(p)); pLow.body.weight=44; pLow.goal.purpose="cut";
  assert(healthGuard(pLow).allowGoal===false, "BMI<16ブロック");

  /* ---- v3: DEED_FORMULA導入後もv2既知入力で計算値が同一（回帰ゼロ） ---- */
  assert(a.bmr.value===1695, "CONFIG等価: BMR=1695");
  assert(a.tdee.value===2627, "CONFIG等価: TDEE=2627");
  assert(a.targetKcal.value===2127, "CONFIG等価: 推奨=2127");
  assert(a.protein.value===115, "CONFIG等価: P=115");
  assert(a.fat.value===59, "CONFIG等価: F=59");
  assert(a.safePace.value===0.5, "CONFIG等価: 安全ペース=0.5");
  /* ---- v3: migration（v1形状→v2形状・既存データ保持・冪等） ---- */
  var mo=normalizeState(migrateState({v:1, screen:"home", consent:true, weights:[{date:"2026-01-01",val:80}], chat:[{role:"dd",text:"x"}]}));
  assert(Array.isArray(mo.meals) && Array.isArray(mo.girths) && mo.photos && mo.photos.start===null && mo.memberStatus==="active" && Array.isArray(mo.milestonesSeen) && mo.v===2, "migration: 新フィールド補完");
  assert(mo.weights.length===1 && mo.chat.length===1 && mo.consent===true, "migration: 既存データ保持");
  assert(JSON.stringify(normalizeState(migrateState(JSON.parse(JSON.stringify(mo)))))===JSON.stringify(mo), "migration: 冪等");
  /* ---- v3: 添削の決定性・厳しめ発火・健康ガード ---- */
  var rr={recommended:2127, protein:115, bmr:1695};
  var mA={id:"mT-1",date:"2026-07-02",slot:"morning",tags:["staple"],amount:"low",photo:null};
  var mB={id:"mT-2",date:"2026-07-02",slot:"noon",tags:["veg"],amount:"low",photo:null};
  var cS1=buildMealComment(mB,[mA,mB],rr,1695);
  assert(cS1.severity==="strict" && cS1.text.indexOf("1695")>=0, "S1発火（低量連続→基礎代謝値を含む）");
  var mC={id:"mT-3",date:"2026-07-02",slot:"evening",tags:["fried"],amount:"high",photo:null};
  var mPre={id:"mT-0",date:"2026-07-02",slot:"noon",tags:["staple","meatfish","fried"],amount:"high",photo:null};
  var cS3=buildMealComment(mC,[mPre,mC],rr,1695);
  assert(cS3.severity==="strict" && cS3.basis.indexOf("S3")>=0, "S3発火（夜×揚げ物×多め）");
  assert(JSON.stringify(cS3)===JSON.stringify(buildMealComment(mC,[mPre,mC],rr,1695)), "添削の決定性");
  var guardTexts=[cS1,cS3,
    buildMealComment({id:"g1",date:"2026-07-02",slot:"snack",tags:["sweet"],amount:"mid",photo:null},[{id:"g0",date:"2026-07-02",slot:"noon",tags:["staple","meatfish"],amount:"mid",photo:null},{id:"g1",date:"2026-07-02",slot:"snack",tags:["sweet"],amount:"mid",photo:null}],rr,1695),
    buildMealComment({id:"g2",date:"2026-07-02",slot:"noon",tags:["meatfish","veg"],amount:"mid",photo:null},[{id:"g2",date:"2026-07-02",slot:"noon",tags:["meatfish","veg"],amount:"mid",photo:null}],rr,1695),
    buildMealComment({id:"g3",date:"2026-07-02",slot:"evening",tags:["sweet","alcohol"],amount:"high",photo:null},[{id:"gp",date:"2026-07-02",slot:"noon",tags:["staple","meatfish","fried"],amount:"high",photo:null},{id:"g3",date:"2026-07-02",slot:"evening",tags:["sweet","alcohol"],amount:"high",photo:null}],rr,1695)
  ].map(function(c){ return c.text; }).join("");
  assert(guardTexts.indexOf("もっと減ら")<0 && guardTexts.indexOf("食べるな")<0 && guardTexts.indexOf("必ず痩せる")<0, "健康ガード: 極端減食を勧める文言なし");
  /* ---- v3: 献立の無捏造・決定性 ---- */
  var mm1=suggestMenus(800,["chicken"],null);
  assert(mm1.length>0 && mm1.every(function(x){ return MENU_DB.indexOf(x)>=0; }), "献立: 全返却がMENU_DBの参照（捏造ゼロ）");
  assert(JSON.stringify(suggestMenus(800,["chicken"],null).map(function(x){return x.id;}))===JSON.stringify(mm1.map(function(x){return x.id;})), "献立: 決定性");
  assert(suggestMenus(100,[],null).every(function(x){ return x.kcal<=400; }), "献立: 残り少でも300kcal級を提案（上限400）");
  /* ---- v3: 退会ロック ---- */
  assert(isLockedFor({memberStatus:"resigned"},false)===true && isLockedFor({memberStatus:"resigned"},true)===false && isLockedFor({memberStatus:"active"},false)===false, "退会ロック判定");
  /* ---- v3: 写真上限10件（最古のみnull化・記録は残す） ---- */
  var savedMeals=state.meals;
  try{ /* 途中例外でも finally で必ず実データを復元（テスト用ダミーで実mealsを失わない） */
    state.meals=[];
    for(var pi=1; pi<=11; pi++){
      state.meals.push({id:"mCap-"+pi, date:"2026-06-"+String(pi).padStart(2,"0"), slot:"noon", tags:["staple"], amount:"mid", photo:"data:image/jpeg;base64,AAAA", photoRemoved:false, comment:null});
    }
    enforcePhotoCap(true);
    assert(state.meals[0].photo===null && state.meals[0].photoRemoved===true && state.meals[1].photo!==null && state.meals.length===11, "写真上限: 11件目で最古1件のみnull化");
  }finally{
    state.meals=savedMeals;
  }
  /* ---- v3: 写真リマインド決定ルール ---- */
  assert(needPhotoReminder("2026-07-03",{start:null,latest:null})===true, "リマインド: 月初×写真なし");
  assert(needPhotoReminder("2026-07-03",{start:null,latest:{date:"2026-07-01",dataURL:"x"}})===false, "リマインド: 今月撮影済みは出ない");
  assert(needPhotoReminder("2026-07-15",{start:null,latest:null})===false, "リマインド: 8日以降は出ない");
  /* ---- v3: 合言葉 ---- */
  assert(verifyStaffPass("deed")===true && verifyStaffPass("DEED")===false, "スタッフ合言葉");

  if(window.console) console.log("[D.D SelfTest] "+(ok?"全テスト PASS":"一部 FAIL（上記参照）"));
}
(function init(){
  var loaded=load();
  if(!loaded) state=defaultState();
  try{ runSelfTests(); }catch(e){}
  render();
})();
</script>
